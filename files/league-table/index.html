<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
<title>National League Archive — Standings (Dynamic from results.json) (v3.27)</title>
    <meta name="color-scheme" content="light" />
    <style>
      :root{
        color-scheme: light;
        --cap-bg:#9e0000; --cap-fg:#fff;
        --head-bg:#000; --head-fg:#fff;
        --zebra-odd:#f6f6f6; --zebra-even:#fff;

        /* Outcomes */
        --gold:gold;
        --silver:#c0c0c0;      /* true silver for play-off winners */
        --pink:#ffe0e6;

        /* Play-offs (greens) */
        --po-elim:#e7f7ea;     /* lighter green */
        --po-semi:#bfe9c8;     /* darker green (SF/byes) */

        --gd-pos:#0a7d2a; --gd-zero:#555; --gd-neg:#b00020;
        --ring:#d0d7de;
      }
      body{ margin:0; font-family:inherit; }
      .wrap, .wrap *{ font-family:inherit; }

      .wrap{ max-width:1200px; margin:0 auto; padding:12px 8px; }
      .controls{ display:flex; gap:.75rem; align-items:center; margin:.5rem 0 .75rem; flex-wrap:wrap; }
      .controls label{ font-weight:600; }
      .controls select{
        padding:6px 10px; border:1px solid var(--ring); border-radius:8px;
        background:#fff; font:inherit;
      }
      .controls .spacer{ flex:1 1 auto; }

      .pillbar{ display:none; gap:.5rem; flex-wrap:wrap; margin:.25rem 0 .5rem; }
      .pillbar button{ border:1px solid var(--ring); background:#fff; border-radius:999px; padding:6px 12px; cursor:pointer; font:inherit; }
      .pillbar button[aria-pressed="true"]{ background:#111; color:#fff; border-color:#111; }
      .pillbar[data-era="post"] button[aria-pressed="true"]{ background:#9e0000; border-color:#9e0000; color:#fff; }

      .table-wrap{ max-width:100%; overflow-x:auto; -webkit-overflow-scrolling:touch; border-radius:10px; box-shadow:0 1px 0 rgba(0,0,0,.05); }
      table{ width:100%; border-collapse:collapse; font-variant-numeric:tabular-nums; }
      caption{ background:var(--cap-bg); color:var(--cap-fg); text-align:center; font-weight:700; padding:10px; caption-side:top; font-size:1.1rem; letter-spacing:.2px; }
      thead th{ position:sticky; top:0; z-index:1; background:var(--head-bg); color:var(--head-fg); text-transform:uppercase; font-size:.85rem; letter-spacing:.3px; }
      th,td{ padding:8px 10px; border:none; vertical-align:middle; text-align:center; white-space:nowrap; font:inherit; }
      th:nth-child(3), td:nth-child(3){ text-align:left; white-space:normal; }
      th:nth-child(n+4), td:nth-child(n+4){ text-align:right; }

      th.move-col, td.move-col{ width:1.8ch; padding-left:4px; padding-right:4px; text-align:center; }
      td.move-col{ font-weight:700; }
      .move-up{ color:var(--gd-pos); } .move-down{ color:var(--gd-neg); } .move-none{ opacity:.35; }

      tbody tr{ background:var(--row-bg, transparent); }
      tbody tr:hover{ background:var(--row-bg, transparent); }
      tbody tr.champion{ --row-bg:var(--gold); color:#000; }
      tbody tr.promoted{ --row-bg:var(--silver); color:#000; }
      tbody tr.playoff{  --row-bg:var(--po-elim); color:#000; }
      tbody tr.playoff-semi{ --row-bg:var(--po-semi); color:#000; }
      tbody tr.playoff-elim{ --row-bg:var(--po-elim); color:#000; }
      tbody tr.relegated{--row-bg:var(--pink); color:#000; }
      tbody tr.folded{ --row-bg:#000; color:#fff; }

      tbody tr.zebra-odd{ --row-bg:var(--zebra-odd); }
      tbody tr.zebra-even{ --row-bg:var(--zebra-even); }

      /* Expunged rows */
      tbody tr.expunged{ --row-bg:#555; color:#fff; }
      /* Cut lines (inferred from final standings) */
      tbody tr.cut-promo-after td{ border-bottom:2px dotted #333; }
      tbody tr.cut-playoff-after td{ border-bottom:2px dotted #333; }
      tbody tr.cut-relegation-after td{ border-bottom:2px dotted #333; }
      /* Force white inside folded/expunged rows */
      tbody tr.cut-champion-after td{ border-bottom:2px dotted #333; }
      tbody tr.cut-playoff-byes-after td{ border-bottom:2px dotted #333; }
      tbody tr.folded td,
      tbody tr.expunged td{ color:#fff !important; }

      tbody tr.folded td.gd-pos,
      tbody tr.folded td.gd-zero,
      tbody tr.folded td.gd-neg,
      tbody tr.expunged td.gd-pos,
      tbody tr.expunged td.gd-zero,
      tbody tr.expunged td.gd-neg{ color:#fff !important; }

      tbody tr.folded .move-up,
      tbody tr.folded .move-down,
      tbody tr.folded .move-none,
      tbody tr.expunged .move-up,
      tbody tr.expunged .move-down,
      tbody tr.expunged .move-none{
        color:#fff !important;
        opacity:1;
      }

      td.gd-pos{ color:var(--gd-pos); font-weight:400; }
      td.gd-zero{ color:var(--gd-zero); font-weight:400; }
      td.gd-neg{ color:var(--gd-neg); font-weight:400; }

      th.strongcol, td.strongcol{ font-weight:700; }

      .legend{ font-size:.9rem; color:#555; margin-top:.5rem; }
      .legend .swatch{ display:inline-block; width:.9em; height:.9em; border-radius:3px; margin:0 .35rem -.12rem .35rem; }
      .legend .gold{ background:var(--gold); }
      .legend .silver{ background:var(--silver); }
      .legend .po-semi{ background:var(--po-semi); }
      .legend .po-elim{ background:var(--po-elim); }
      .legend .pink{ background:var(--pink); }
      .legend .black{ background:#000; }
      .legend .grey{ background:#555; }
      
      .error{ display:none; background:#ffe9ec; color:#b00020; border:1px solid #f0b9c2; padding:8px 10px; border-radius:8px; margin:.5rem 0; font-weight:600; white-space:pre-wrap; }

      .season-note{ margin-top:.5rem; padding:10px 12px; border-left:4px solid #9e0000; background:#f8f8f8; color:#222; }
      .season-note{ margin-top:.5rem; padding:10px 12px; border-left:4px solid #9e0000; background:#f8f8f8; color:#222; }
      /* Date-specific clinched statuses (ONLY when mathematically secured) */
      tbody tr.clinched-champion{ --row-bg:var(--gold); color:#000; }
      tbody tr.clinched-po-semi{ --row-bg:var(--po-semi); color:#000; }
      tbody tr.clinched-po-elim{ --row-bg:var(--po-elim); color:#000; }
      tbody tr.clinched-relegated{ --row-bg:var(--pink); color:#000; }

      /* Subtle semi vs eliminator marker (NOT a box outline) */
      .note-line{ white-space:normal; margin:2px 0; }
      .season-note[hidden]{ display:none; }
      .note-line{ white-space:normal; margin:2px 0; }
      /* Row-level semi vs eliminator marker (continuous, no cell seams) */
      tbody tr.clinched-po-semi{
        background-image: linear-gradient(to right, rgba(0,96,32,.60) 0, rgba(0,96,32,.60) 4px, transparent 4px);
        background-repeat: no-repeat;
      }
      tbody tr.clinched-po-elim{
        background-image: linear-gradient(to right, rgba(0,96,32,.28) 0, rgba(0,96,32,.28) 4px, transparent 4px);
        background-repeat: no-repeat;
      }
      .note-line.note-flash{ animation: noteGlow 1200ms ease-out; }
      @keyframes noteGlow { from{ background:#fff4cc; } to{ background:transparent; } }

      .note-ref{ font-size:.68em; line-height:1; vertical-align:.2em; opacity:.6; cursor:pointer; }
      .note-ref a, .note-ref span{ text-decoration:none; display:inline-block; min-width:.9ch; text-align:center; }
      .note-ref a{ cursor:pointer; }
      .note-ref + *{ margin-left:.15em; }
      td:nth-child(3) .note-ref{ margin-left:.15em; }

      @keyframes rowGlow { 0%{ box-shadow: inset 0 0 0 3px rgba(255,204,0,.95); } 100%{ box-shadow: inset 0 0 0 3px rgba(255,204,0,0); } }
      tr.row-flash{ animation: rowGlow 1400ms ease-out; }

      @keyframes rowFade { from { opacity:0; } to { opacity:1; } }
      tbody tr.anim-in{ opacity:0; animation: rowFade 260ms ease-out forwards; animation-delay: calc(var(--i, 0) * 35ms); will-change: opacity; }
      @media (prefers-reduced-motion: reduce){ tbody tr.anim-in{ animation: none; opacity:1; } }

      @media (max-width: 1100px){
        th:nth-child(6), td:nth-child(6),
        th:nth-child(7), td:nth-child(7),
        th:nth-child(9), td:nth-child(9){ display:none; }
      }
      @media (max-width: 980px){ th:nth-child(8), td:nth-child(8){ display:none; } }
      @media (max-width: 860px){ th:nth-child(5), td:nth-child(5){ display:none; } }
      @media (max-width: 740px){ th:nth-child(4), td:nth-child(4){ display:none; } }
      @media (max-width: 620px){ th:nth-child(10), td:nth-child(10){ display:none; } }
    </style>
  </head>

  <body>
    <div class="wrap">
      <div class="controls">
        <label for="season-select">Season:</label>
        <select id="season-select" aria-label="Select season"></select>

        <label for="asof-select">As of:</label>
        <select id="asof-select" aria-label="Select date cut-off"></select>

        <span class="spacer" aria-hidden="true"></span>
      </div>

      <div id="division-pills" class="pillbar" aria-label="Divisions"></div>

      <div id="error" class="error" role="alert" aria-live="assertive"></div>

      <div class="table-wrap">
        <table id="standings" aria-describedby="legend">
          <caption id="table-caption" aria-live="polite">Alliance / Conference / National League — Standings</caption>
          <thead>
            <tr>
              <th scope="col">Pos</th>
              <th scope="col" class="move-col" aria-label="Movement" title="Promotion/Relegation">↕</th>
              <th scope="col">Team</th>
              <th scope="col"><abbr title="Played">P</abbr></th>
              <th scope="col"><abbr title="Wins">W</abbr></th>
              <th scope="col"><abbr title="Draws">D</abbr></th>
              <th scope="col"><abbr title="Losses">L</abbr></th>
              <th scope="col"><abbr title="Goals For">GF</abbr></th>
              <th scope="col"><abbr title="Goals Against">GA</abbr></th>
              <th scope="col"><abbr title="Goal Difference">GD</abbr></th>
              <th scope="col" class="strongcol"><abbr title="Points">Pts</abbr></th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>

      <p class="legend" id="legend" aria-live="polite"><strong>Legend:</strong> </p>
      <div class="season-note" id="season-note" hidden aria-live="polite"></div>
    </div>

    <script>
    (function(){
        // =========================
        // Data sources (same folder)
        // =========================
        const RESULTS_SRC = "https://raw.githubusercontent.com/rckd-nl/website/main/results.json";          // REQUIRED (league results + dates)
        const TABLES_SRC  = "https://raw.githubusercontent.com/rckd-nl/website/main/league-tables.json";    // REQUIRED (final standings + classes/movement)
        const EXPULSIONS_SRC = "./expulsions.json";   // OPTIONAL (ignored if missing)
        const CLUBS_META_SRC = "https://raw.githubusercontent.com/rckd-nl/website/main/clubs-meta.json";
        const SEASON_NOTES_SRC = "https://raw.githubusercontent.com/rckd-nl/website/main/season-notes.json";

        // =========================
        // DOM helpers
        // =========================
        const $ = s => document.querySelector(s);
        const createEl = (tag, props = {}, children = []) => {
          const el = document.createElement(tag);
          for (const [k, v] of Object.entries(props)){
            if (k === 'class') el.className = v;
            else if (k === 'dataset') Object.assign(el.dataset, v);
            else if (k in el) el[k] = v; else el.setAttribute(k, v);
          }
          children.flat().forEach(c => el.appendChild(typeof c === 'string' ? document.createTextNode(c) : c));
          return el;
        };
        const setText = (el, txt) => { el.textContent = String(txt ?? ''); };

        const els = {
          seasonSel: $('#season-select'),
          asofSel: $('#asof-select'),
          pills: $('#division-pills'),
          tbody: $('#standings tbody'),
          caption: $('#table-caption'),
          legend: $('#legend'),
          note: $('#season-note'),
          err: $('#error'),
          table: $('#standings')
        };

        // =========================
        // State
        // =========================
          const state = {
            seasons: [],               // seasons from results.json
            byKey: {},                 // seasonKey -> season (results.json)
            finalByKey: {},            // seasonKey -> season (league-tables.json)
            current: { season:null, division:null, asof:null },

            // NEW: inferred cut lines per season+division (from final standings)
            cutsBySeason: new Map(),   // Map<seasonKey, Map<divisionName, {promo:number|null, playoff:number|null, relegation:number|null}>>
          
            // meta/name helpers
            metaBySlug: new Map(),     // Map<slug, clubMeta>
            aliasMap: new Map(),       // Map<canonName, Set<slug>>
          
            // season notes (unchanged)
            seasonNotes: new Map(),    // Map<season, Map<division, Array<{team,note}>>>
            
            // season notes (full objects for rules)
            seasonNotesFull: new Map(), // Map<season, Map<division, Array<noteObj>>>
            
            // expulsions: Map<season, Map<division, Array<{team,date}>>>
            expulsions: new Map()
          };
          // Season formats (champions / playoffs / relegation), keyed by season+division
          // Map<seasonKey, Map<divisionName, {champions:number, playoffsSemi:number, playoffsElim:number, relegation:number}>>
          state.seasonFormats = new Map();
        // =========================
        // Utils
        // =========================
        const canon = s => String(s||'').toLowerCase().replace(/\s+/g,' ').trim();
        const slugify = s => canon(s).replace(/[^a-z0-9]+/g,'-').replace(/(^-|-$)/g,'');
        const startYear = s => { const m=/^(\d{4})/.exec(String(s)||''); return m?+m[1]:0; };
        const classForGD = gd => gd>0?'gd-pos': gd<0?'gd-neg':'gd-zero';
        const toISO = s => String(s||'').slice(0,10); // "YYYY-MM-DD"
        const isoToNum = s => {
          const m = /^(\d{4})-(\d{2})-(\d{2})$/.exec(String(s||''));
          if (!m) return 0;
          return Number(m[1]) * 10000 + Number(m[2]) * 100 + Number(m[3]);
        };
      
      // =========================
// PPG finalisation support
// =========================
function seasonUsesPPG(seasonKey, divisionName, asOfISO, includeUndated){
  const notes = activeNotesFor(seasonKey, divisionName, asOfISO, !!includeUndated);
  return notes.some(n => String(n.type || '').toLowerCase() === 'ppg');
}

function applyPPGRankingIfNeeded(seasonKey, divisionName, asOfISO, rows, includeUndated){
  if (!Array.isArray(rows) || !rows.length) return rows;
  if (!seasonUsesPPG(seasonKey, divisionName, asOfISO, includeUndated)) return rows;

  rows.forEach(r=>{
    const p = Number(r.P || 0);
    const pts = Number(r.Pts || 0);
    r._ppg = (p > 0) ? (pts / p) : 0;
  });

  rows.sort((a,b)=>{
    if (b._ppg !== a._ppg) return b._ppg - a._ppg;
    if (b.Pts !== a.Pts) return b.Pts - a.Pts;
    if (b.GD !== a.GD) return b.GD - a.GD;
    if (b.GF !== a.GF) return b.GF - a.GF;
    return String(a.team).localeCompare(String(b.team));
  });

  rows.forEach((r,i)=> r.pos = i + 1);
  rows.forEach(r=> delete r._ppg);

  return rows;
}
      
        function formatISODateShort(iso){
          // iso: YYYY-MM-DD -> "Sat 18 Aug 1984"
          const m = /^(\d{4})-(\d{2})-(\d{2})$/.exec(String(iso||''));
          if (!m) return String(iso||'');
          const y = +m[1], mo = +m[2], d = +m[3];

          // Use UTC to avoid local TZ shifting the day
          const dt = new Date(Date.UTC(y, mo - 1, d));
          const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
          const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

          const dow = days[dt.getUTCDay()];
          return `${dow} ${String(d)} ${months[mo - 1]} ${y}`;
        }

        function isNoteActiveAsOf(noteObj, asOfISO, includeUndated){
          const ed = noteObj?.effectiveDate;

          // Undated notes apply only when explicitly included (derived final)
          if (!ed) return !!includeUndated;

          // Special markers
          if (ed === 'start_of_season') return true;
        
          // End-of-season notes should apply in final contexts where asOf is effectively "season end"
          if (ed === 'end_of_season') return true;
          
          // Date-based
          if (/^\d{4}-\d{2}-\d{2}$/.test(ed)){
            return isoToNum(ed) <= isoToNum(asOfISO);
          }

          // Unknown strings: treat as NOT active unless includeUndated
          return !!includeUndated;
        }

        function activeNotesFor(seasonKey, divisionName, asOfISO, includeUndated){
          const fm = state.seasonNotesFull.get(String(seasonKey));
          if (!fm) return [];
          const arr = fm.get(String(divisionName)) || [];
          return arr.filter(n => isNoteActiveAsOf(n, asOfISO, includeUndated));
        }
      
        // Points rule (simple + historic default)
        // 2 points for a win before 1981-82; otherwise 3 points.
        function pointsForWin(seasonKey){
          const y = startYear(seasonKey);
          return (y && y < 1981) ? 2 : 3;
        }

        // Ensure a title includes the season key once
        const withYear = (title, seasonKey) => {
          const t = String(title || '').trim();
          const y = String(seasonKey || '').trim();
          const norm = s => s.replace(/[\u2013\u2014\u2212]/g, '-');
          return norm(t).includes(norm(y)) ? t : (t ? `${t} ${y}` : y);
        };

        function showErr(m,d){
          els.err.style.display='block';
          setText(els.err, d ? (m + "\n\n" + d) : m);
          console.error(m, d || '');
        }
        function clearErr(){ els.err.style.display='none'; els.err.textContent=''; }

        // =========================
        // Meta (same as v2.3)
        // =========================
        function indexMeta(meta){
          state.metaBySlug.clear();
          state.aliasMap.clear();

          const list = Array.isArray(meta?.clubs) ? meta.clubs : [];
          for (const c of list){
            if (!c?.slug) continue;
            state.metaBySlug.set(c.slug, c);

            if (c.primaryName){
              const k = canon(c.primaryName);
              if (!state.aliasMap.has(k)) state.aliasMap.set(k, new Set());
              state.aliasMap.get(k).add(c.slug);
            }

            const rules = Array.isArray(c.displayRules) ? c.displayRules : [];
            for (const r of rules){
              if (!r?.as) continue;
              const k = canon(r.as);
              if (!state.aliasMap.has(k)) state.aliasMap.set(k, new Set());
              state.aliasMap.get(k).add(c.slug);
            }
          }
        }

        function ruleMatchesSeason(rule, seasonKey){
          const y = startYear(seasonKey);
          if (rule.season) return rule.season === seasonKey;
          const fromY = rule.from ? startYear(rule.from) : -Infinity;
          const toY   = rule.to   ? startYear(rule.to)   :  Infinity;
          return y >= fromY && y <= toY;
        }

        function displayNameForSeason(slug, seasonKey){
          const meta = state.metaBySlug.get(slug);
          if (!meta) return slug;

          const rules = Array.isArray(meta.displayRules) ? meta.displayRules : [];
          const match = rules.find(r => r.as && ruleMatchesSeason(r, seasonKey));
          return match ? match.as : (meta.primaryName || slug);
        }

        function bestEffortSlugFromName(name, seasonKey){
          const k = canon(name);
          const candidates = state.aliasMap.get(k);
          if (!candidates || !candidates.size) return '';

          if (candidates.size === 1) return Array.from(candidates)[0];

          for (const slug of candidates){
            const meta = state.metaBySlug.get(slug);
            if (!meta) continue;

            const rules = Array.isArray(meta.displayRules) ? meta.displayRules : [];
            if (rules.some(r => r.as && canon(r.as)===k && ruleMatchesSeason(r, seasonKey))) return slug;
          }
          return Array.from(candidates)[0];
        }

        // =========================
        // Season Notes (unchanged)
        // =========================
function indexSeasonNotes(raw){
  state.seasonNotes.clear();
  state.seasonNotesFull.clear();

  const list = Array.isArray(raw) ? raw : Array.isArray(raw?.notes) ? raw.notes : [];

  for (const it of list){
    if (!it?.season || !it?.division) continue;

    const s = String(it.season);
    const d = String(it.division);

    const team = (it.team != null && String(it.team).trim() !== '') ? String(it.team) : '';
    const entity = (it.entity != null && String(it.entity).trim() !== '')
      ? String(it.entity)
      : (team ? team : ''); // division-wide notes may have neither

    const noteText = (it.note != null && String(it.note).trim() !== '') ? String(it.note) : '';

    // 1) simple store for display (EXISTING BEHAVIOUR: team-scoped notes only)
    if (team && noteText){
      if (!state.seasonNotes.has(s)) state.seasonNotes.set(s, new Map());
      const dm = state.seasonNotes.get(s);
      if (!dm.has(d)) dm.set(d, []);
      dm.get(d).push({ team:String(team), entity:String(entity || team || ''), note:String(noteText) });
    }

    // 2) full store for rules (NEW: includes division-wide notes like type:"ppg")
    if (!state.seasonNotesFull.has(s)) state.seasonNotesFull.set(s, new Map());
    const fm = state.seasonNotesFull.get(s);
    if (!fm.has(d)) fm.set(d, []);

    fm.get(d).push({
      season: s,
      division: d,
      team: String(team),                          // may be ""
      entity: String(entity),                      // may be ""
      type: String(it.type || 'general').toLowerCase(),
      pointsValue: (it.pointsValue != null && it.pointsValue !== '') ? Number(it.pointsValue) : null,
      effectiveDate: (it.effectiveDate != null && it.effectiveDate !== '') ? String(it.effectiveDate) : null,
      note: String(noteText)                       // may be ""
    });
  }
}
      
        function parsePlayoffsValue(v){
          // Returns { semi:number, elim:number }
          // Supports BOTH:
          //  A) object: { semi:2, eliminator:4 } or { semi:2, elim:4 }
          //  B) string: "4" or "2,4"
          //  C) empty/0

          // Object form (your current season-notes.json)
          if (v && typeof v === 'object' && !Array.isArray(v)){
            const semi = Number(v.semi ?? 0);
            const elim = Number(v.eliminator ?? v.elim ?? 0);
            return {
              semi: Number.isFinite(semi) ? semi : 0,
              elim: Number.isFinite(elim) ? elim : 0
            };
          }

          // String/number form (legacy)
          const raw = String(v ?? '').trim();
          if (!raw || raw === '0') return { semi:0, elim:0 };

          if (raw.includes(',')){
            const parts = raw.split(',').map(x => Number(String(x).trim()));
            const semi = Number.isFinite(parts[0]) ? parts[0] : 0;
            const elim = Number.isFinite(parts[1]) ? parts[1] : 0;
            return { semi, elim };
          }

          const n = Number(raw);
          if (!Number.isFinite(n) || n <= 0) return { semi:0, elim:0 };
          return { semi:0, elim:n };
        }
      
        function indexSeasonFormats(raw){
          // Accept season-notes.json as either:
          //  A) [ ...notes... ]  (no formats)
          //  B) { notes:[...], seasonFormat:[...] }   (preferred)
          //  C) { notes:[...], formats:[...] }        (legacy)

  const relPlaces = Math.max(0, Number(fmt.relegation || 0));

  const poElim = Number(fmt.playoffsElim || 0);
  const hasPlayoffs = (poSemi > 0 || poElim > 0);

  // 4-team: positions 2–5 (all are semi-finalists)
  // 6-team: positions 2–3 byes (semi), 4–7 eliminators

        } else {
          if (!r.classes.includes('playoff-elim')) r.classes.push('playoff-elim');

    // Relegation zone (positions only — not "relegated")
    if (relPlaces > 0){
      const safeLinePos = teamCount - relPlaces;
      if (Number.isFinite(safeLinePos) && pos > safeLinePos){
        if (!r.classes.includes('relegation-zone')) r.classes.push('relegation-zone');
      }
    }

function applyClinchedEmphasis(seasonKey, divisionName, asOfISO, rows, matches){
  const fmt = state.seasonFormats.get(String(seasonKey))?.get(String(divisionName)) || null;
  if (!fmt) return rows;

  const ptsWin = pointsForWin(seasonKey);

  // Clinching must be calculated against the INTENDED schedule, not whatever fixtures
  // happen to exist in results.json (curtailments / missing data would otherwise
  // create false early clinches).
  //
  // Assumption: double round-robin (home & away) within the division.
  // Therefore: maxGames = (teamCount - 1) * 2
  //
  // IMPORTANT: use the division team-count (rows includes expunged placeholders too),
  // so expulsions/expunged records do NOT shrink the theoretical schedule ceiling.
  const teamCountForCeiling = Math.max(0, Number(rows?.length || 0));
  const maxGames = (teamCountForCeiling >= 2) ? ((teamCountForCeiling - 1) * 2) : 0;
  
  // Max possible points per team (using the shared maxGames ceiling)
  const maxPts = new Map();
  for (const r of rows){
    const team = String(r.team || '').trim();
    const playedNow = Number(r.P || 0);
    const rem = Math.max(0, maxGames - (Number.isFinite(playedNow) ? playedNow : 0));
    maxPts.set(team, Number(r.Pts || 0) + ptsWin * rem);
  }

  const teamCount = rows.length;

  // Champions / play-off clinches are calculated as "guaranteed top-K" based on max possible points.
  // A team is guaranteed top-K if its current points are greater than the Kth-highest maxPts among ALL OTHER teams.

  const champSlots = Math.max(1, Number(fmt.champions || 1));

  // Play-offs format
  const poSemi = Number(fmt.playoffsSemi || 0);
  const poElim = Number(fmt.playoffsElim || 0);
  const hasPlayoffs = (poSemi > 0 || poElim > 0);

  let poFieldEndPos = null; // 5 (4-team) or 7 (6-team)
  let poByeEndPos = null;   // 3 for 6-team byes

  if (hasPlayoffs && poSemi === 0 && poElim === 4){
    poFieldEndPos = 5;
    poByeEndPos = null;
  }
  if (hasPlayoffs && poSemi === 2 && poElim === 4){
    poFieldEndPos = 7;
    poByeEndPos = 3;
  }

  function kthHighestMaxPtsAmongOthers(teamName, k){
    const vals = [];
    for (const r of rows){
      const t = String(r.team || '').trim();
      if (!t) continue;
      if (t === teamName) continue;
      const v = maxPts.get(t);
      if (Number.isFinite(v)) vals.push(v);
    }
    vals.sort((a,b)=> b - a);
    if (k <= 0) return null;
    if (vals.length < k) return null;
    return vals[k - 1];
  }
  
  // Relegation (mathematical)
  const relPlaces = Math.max(0, Number(fmt.relegation || 0));
  const safePos = (relPlaces > 0) ? (teamCount - relPlaces) : null;
  const safePtsNow = (safePos && safePos >= 1 && safePos <= teamCount)
    ? Number(rows[safePos - 1].Pts || 0)
    : null;

  for (const r of rows){
    r.classes = Array.isArray(r.classes) ? r.classes : [];

    if (r.classes.includes('expunged')) continue;

    const pos = Number(r.pos);
    const ptsNow = Number(r.Pts || 0);
    const team = String(r.team || '').trim();
    const teamMax = maxPts.get(team);

    // Clear any previous clinched-* (defensive; rows are rebuilt anyway)
    r.classes = r.classes.filter(c =>
      c !== 'clinched-champion' &&
      c !== 'clinched-po-semi' &&
      c !== 'clinched-po-elim' &&
      c !== 'clinched-relegated'
    );

    // Champions (guaranteed top-1)
    // If current points exceed the highest maxPts of any other team, the title is secured.
    const top1Threshold = kthHighestMaxPtsAmongOthers(team, 1);
    if (top1Threshold != null && ptsNow > top1Threshold){
      r.classes.push('clinched-champion');
      continue; // don't also label play-offs
    }

    // Play-offs (guaranteed top-K)
    // For 4-team playoffs: K=5 (positions 1–5 are "top-5")
    // For 6-team playoffs: K=7 (positions 1–7 are "top-7"), and byes are top-3.
    if (hasPlayoffs && poFieldEndPos != null){
      const topFieldThreshold = kthHighestMaxPtsAmongOthers(team, poFieldEndPos);
      const hasClinchedField = (topFieldThreshold != null && ptsNow > topFieldThreshold);

      if (hasClinchedField){
        if (poByeEndPos == null){
          // 4-team: everyone who clinches top-5 is effectively a semi-final position
          r.classes.push('clinched-po-semi');
        } else {
          // 6-team: upgrade to "semi bye" only once top-3 is also guaranteed
          const topByeThreshold = kthHighestMaxPtsAmongOthers(team, poByeEndPos);
          const hasClinchedBye = (topByeThreshold != null && ptsNow > topByeThreshold);

          if (hasClinchedBye){
            r.classes.push('clinched-po-semi');
          } else {
            r.classes.push('clinched-po-elim');
          }
        }
      }
    }
    
    // Relegated (mathematical)
    if (relPlaces > 0 && safePtsNow != null && Number.isFinite(teamMax) && teamMax < safePtsNow){
      r.classes.push('clinched-relegated');
    }
  }

  return rows;

function buildFinalRow(r, idx, seasonKey){

  const tr = document.createElement('tr');

      !tr.classList.contains('relegated') &&
      !tr.classList.contains('folded') &&
      !tr.classList.contains('expunged')){

  }

  tr.style.setProperty('--i', idx);
  tr.classList.add('anim-in');

  const mvRaw = (r.move != null ? r.move : r.movement);
  let mv = (typeof mvRaw === 'string') ? mvRaw.trim().toLowerCase() : '';
  if (mv !== 'up' && mv !== 'down') mv = '';

  const cells = [
    r.pos,
    { move: mv },
    label,
    r.P, r.W, r.D, r.L, r.GF, r.GA,
    { gd: r.GD },
    r.Pts
  ];

  cells.forEach((val, i)=>{
    const td = document.createElement('td');

    if (i === 1){
      td.classList.add('move-col');
      if (val && typeof val === 'object'){
        if (val.move === 'up'){ setText(td,'↑'); td.classList.add('move-up'); td.title='Promoted'; td.setAttribute('aria-label','Promoted'); }
        else if (val.move === 'down'){ setText(td,'↓'); td.classList.add('move-down'); td.title='Relegated'; td.setAttribute('aria-label','Relegated'); }
        else { setText(td,''); td.classList.add('move-none'); }
      } else { setText(td,''); td.classList.add('move-none'); }
      tr.appendChild(td);
      return;
    }

    if (i === 9){
      let gd = Number((val && typeof val === 'object') ? val.gd : val);
      if (!isFinite(gd)){
        const gf = Number(r.GF), ga = Number(r.GA);
        gd = (isFinite(gf) && isFinite(ga)) ? (gf - ga) : 0;
      }
      setText(td, gd > 0 ? ('+' + gd) : String(gd));
      td.classList.add(classForGD(gd));
      tr.appendChild(td);
      return;

    setText(td, (val != null ? val : ''));
    tr.appendChild(td);
  });

}

  const hAet = Number(fin.home_aet);
  const aAet = Number(fin.away_aet);
  if (Number.isFinite(hAet) && Number.isFinite(aAet)){
    if (hAet > aAet) return h;
    if (aAet > hAet) return a;
  }

  // Optional: pens if ever added later (kept defensive)
  const hPen = Number(fin.home_pens);
  const aPen = Number(fin.away_pens);
  if (Number.isFinite(hPen) && Number.isFinite(aPen)){
    if (hPen > aPen) return h;
    if (aPen > hPen) return a;
  }

  return '';
}
      
function getPlayoffWinnerFromFinalTables(seasonKey, divisionName){
  const season = state.finalByKey?.[seasonKey];
  const div = season?.divisions?.[divisionName];
  const rows = Array.isArray(div?.rows) ? div.rows : [];

  // In league-tables.json your convention is: play-off winner has class 'promoted' (silver)
  // Exclude champions at pos 1.
  const hit = rows.find(r => {
    const cls = r.classes || [];
    const pos = Number(r.pos);
    return Number.isFinite(pos) && pos >= 2 && cls.includes('promoted');
  });

  return hit ? String(hit.team || '').trim() : '';
}

function applyFinalRulesFromNotes(seasonKey, divisionName, asOfISO, rows){
  // Derived final includes undated notes
  const includeUndated = true;
  const notes = activeNotesFor(seasonKey, divisionName, asOfISO, includeUndated);

  // Canonical match key is ALWAYS entity.
  // r.team (from results.json) is the canonical entity string.
  const notesByEntity = new Map(); // canon(entity) -> list
  for (const n of notes){
    const k = canon(n.entity || '');
    if (!k) continue;
    if (!notesByEntity.has(k)) notesByEntity.set(k, []);
    notesByEntity.get(k).push(n);
  }
  
  const fmt = state.seasonFormats.get(String(seasonKey))?.get(String(divisionName)) || null;
  const teamCount = rows.length;

  // Zones from format (fallback to inferred cuts)
  const cuts =
    cutsFromSeasonFormats(seasonKey, divisionName, teamCount) ||
    inferCutsFromFinal(seasonKey, divisionName) ||
    { champion:1, playoff:null, playoffByes:null, relegation:null };

  // Determine “relegated positions” from cuts.relegation
  const relegationLinePos = (cuts && Number.isFinite(cuts.relegation)) ? Number(cuts.relegation) : null;

  // Determine play-off field end
  const poFmt = getPlayoffFormatForSeason(seasonKey, divisionName);
  const playoffFieldEnd = poFmt ? poFmt.fieldEnd : null;

  // Only treat a season as having play-offs if we can identify a play-off format
  const hasPlayoffs = !!playoffFieldEnd;

  // Only look for a play-off winner when play-offs exist
  const playoffWinner = hasPlayoffs
    ? (findPlayoffWinnerFromResults(seasonKey, divisionName) || getPlayoffWinnerFromFinalTables(seasonKey, divisionName))
    : '';

  // Global toggles from notes (no_relegation affects entire division)
  const hasNoRelegation = notes.some(n => n.type === 'no_relegation');

  // no_playoffs is entity-specific (canonical)
  const teamsNoPlayoffs = new Set(
    notes
      .filter(n => n.type === 'no_playoffs')
      .map(n => canon(n.entity || ''))
      .filter(Boolean)
  );
  
  // Apply base final zones
  rows.forEach(r=>{
    r.classes = Array.isArray(r.classes) ? r.classes : [];
    r.move = ''; // 'up' or 'down' only on final views

    // Keep expunged as expunged
    if (r.classes.includes('expunged')){
      r.move = 'down';
      return;
    }

    // Champion colouring
    if (Number(r.pos) === 1){
      if (!r.classes.includes('champion')) r.classes.push('champion');
    }

    // Play-off qualifiers colouring (positions 2..fieldEnd)
    if (playoffFieldEnd && Number(r.pos) >= 2 && Number(r.pos) <= playoffFieldEnd){
      if (!r.classes.includes('playoff')) r.classes.push('playoff');

      // semi/eliminator tone
      if (poFmt && poFmt.byeEnd == null){
        if (!r.classes.includes('playoff-semi')) r.classes.push('playoff-semi');
      } else if (poFmt && poFmt.byeEnd != null){
        if (Number(r.pos) <= Number(poFmt.byeEnd)){
          if (!r.classes.includes('playoff-semi')) r.classes.push('playoff-semi');
        } else {
          if (!r.classes.includes('playoff-elim')) r.classes.push('playoff-elim');
        }
      }
    }

    // Relegation colouring (final only)
    if (!hasNoRelegation && relegationLinePos != null && Number(r.pos) > relegationLinePos){
      if (!r.classes.includes('relegated')) r.classes.push('relegated');
      r.move = 'down';
    }
  });

  // Promotions (final only)
  const championTeam = rows.find(r => Number(r.pos) === 1)?.team || '';
  const championKey = canon(championTeam);

  // Champion promoted unless not_promoted exists for that team
  const champNotes = notesByEntity.get(championKey) || [];
  const champNotPromoted = champNotes.some(n => n.type === 'not_promoted');
  
  // IMPORTANT:
  // Champions should stay GOLD (champion class) and only get an ↑ arrow.
  // Do NOT add the 'promoted' class here (that styling is reserved for the play-off winner = silver).
  if (championTeam && !champNotPromoted){
    const r = rows.find(x => canon(x.team) === championKey);
    if (r){
      r.move = 'up';
    }
  }
  
  // Play-off winner promoted (unless no_playoffs or missing)
  // Only applicable when play-offs exist.
  const poWinnerKey = canon(playoffWinner);
  if (hasPlayoffs && playoffWinner){
    const r = rows.find(x => canon(x.team) === poWinnerKey);
    if (r){
      if (!teamsNoPlayoffs.has(poWinnerKey)){
        // IMPORTANT: silver must win over blue, so remove playoff qualifier classes
        r.classes = r.classes.filter(c => c !== 'playoff' && c !== 'playoff-semi' && c !== 'playoff-elim');

        if (!r.classes.includes('promoted')) r.classes.push('promoted');
        r.move = 'up';
      }
    }
  }
  
  // Demotion (note) forces relegated+down
  for (const r of rows){
    const k = canon(r.team);
    const tnotes = notesByEntity.get(k) || [];
    if (tnotes.some(n => n.type === 'demotion')){
      if (!r.classes.includes('relegated')) r.classes.push('relegated');
      r.move = 'down';
    }
  }

  // Reprieve removes relegated + down arrow
  for (const r of rows){
    const k = canon(r.team);
    const tnotes = notesByEntity.get(k) || [];
    if (tnotes.some(n => n.type === 'reprieve')){
      r.classes = r.classes.filter(c => c !== 'relegated');
      if (r.move === 'down') r.move = '';
    }
  }

  // no_relegation removes all relegation colouring/arrows
  if (hasNoRelegation){
    for (const r of rows){
      r.classes = r.classes.filter(c => c !== 'relegated');
      if (r.move === 'down') r.move = '';
    }
  }

  // Folded: black row + down arrow (no expunging of results)
  for (const r of rows){
    const k = canon(r.team);
    const tnotes = notesByEntity.get(k) || [];
    if (tnotes.some(n => n.type === 'folded')){
      r.classes = r.classes.filter(c => c !== 'relegated');
      if (!r.classes.includes('folded')) r.classes.push('folded');
      r.move = 'down';
    }
  }

  // Expulsion: expunged styling + down arrow (results already expunged by standings calc once effective)
  for (const r of rows){
    const k = canon(r.team);
    const tnotes = notesByEntity.get(k) || [];
    if (tnotes.some(n => n.type === 'expulsion')){
      r.classes = r.classes.filter(c => c !== 'relegated');
      if (!r.classes.includes('expunged')) r.classes.push('expunged');
      r.move = 'down';
    }
  }

  // no_playoffs: remove playoff colouring for that team on the final table
  for (const r of rows){
    const k = canon(r.team);
    if (teamsNoPlayoffs.has(k)){
      r.classes = r.classes.filter(c => c !== 'playoff' && c !== 'playoff-semi' && c !== 'playoff-elim');
      // If they were promoted via play-offs, remove that too
      r.classes = r.classes.filter(c => c !== 'promoted');
      if (r.move === 'up') r.move = '';
    }
  }

  // If champion was not promoted: keep champion colour but remove up arrow and promoted class
  if (champNotPromoted && championTeam){
    const r = rows.find(x => canon(x.team) === championKey);
    if (r){
      r.classes = r.classes.filter(c => c !== 'promoted');
      if (r.move === 'up') r.move = '';
    }
  }

  return rows;
}

function buildDerivedFinalRow(r, idx, seasonKey){
  // Same label logic as buildRow, but includes movement arrow on final views
  const rawName = String(r.team || '').trim();
  const slug = bestEffortSlugFromName(rawName, seasonKey) || '';
  const label = slug ? displayNameForSeason(slug, seasonKey) : rawName;

  const tr = document.createElement('tr');
  tr.id = rowIdFor(slug, label);
  if (slug) tr.setAttribute('data-team-slug', slug);

  (r.classes || []).forEach(c => tr.classList.add(c));

  // Zebra only if not special
  const hasSpecial =
    tr.classList.contains('champion') ||
    tr.classList.contains('promoted') ||
    tr.classList.contains('playoff') ||
    tr.classList.contains('relegated') ||
    tr.classList.contains('folded') ||
    tr.classList.contains('expunged');

  if (!hasSpecial){
    tr.classList.add((idx % 2 === 0) ? 'zebra-odd' : 'zebra-even');
  }

  tr.style.setProperty('--i', idx);
  tr.classList.add('anim-in');

  const mv = (r.move === 'up' || r.move === 'down') ? r.move : '';

  const cells = [
    r.pos,
    { move: mv },
    label,
    r.P, r.W, r.D, r.L, r.GF, r.GA,
    { gd:r.GD },
    r.Pts
  ];

  cells.forEach((val, i)=>{
    const td = document.createElement('td');

    if (i === 1){
      td.classList.add('move-col');
      if (val && typeof val === 'object'){
        if (val.move === 'up'){ setText(td,'↑'); td.classList.add('move-up'); td.title='Promoted'; td.setAttribute('aria-label','Promoted'); }
        else if (val.move === 'down'){ setText(td,'↓'); td.classList.add('move-down'); td.title='Relegated'; td.setAttribute('aria-label','Relegated'); }
        else { setText(td,''); td.classList.add('move-none'); }
      } else { setText(td,''); td.classList.add('move-none'); }
      tr.appendChild(td);
      return;
    }

    if (i === 9){
      let gd = Number((val && typeof val === 'object') ? val.gd : val);
      if (!isFinite(gd)) gd = 0;
      setText(td, gd > 0 ? ('+' + gd) : String(gd));
      td.classList.add(classForGD(gd));
      tr.appendChild(td);
      return;
    }

    setText(td, (val != null ? val : ''));
    tr.appendChild(td);
  });

  return tr;
}

function renderDerivedFinalTable(seasonKey, divisionName){
  const seasonObj = state.byKey[seasonKey];
  const divObj = seasonObj?.divisions?.[divisionName];
  const matches = Array.isArray(divObj?.matches) ? divObj.matches : [];

  // derived final uses last regular-season league date
  const lastLeagueDate = state.current.lastLeagueDate;
  if (!lastLeagueDate){
    // fallback: just render the league-tables final if we can't find it
    renderFinalTable(seasonKey, divisionName);
    return;
  }

  // Compute as-of last league date (league-only) but include UNDATED notes now
  let rows = computeStandings(seasonKey, divisionName, lastLeagueDate);

  // Apply dated points deductions up to lastLeagueDate AND undated at derived-final
  rows = applyPointsAdjustments(seasonKey, divisionName, lastLeagueDate, rows, true);

  // Apply PPG ranking if season uses PPG finalisation
  rows = applyPPGRankingIfNeeded(seasonKey, divisionName, lastLeagueDate, rows, true);
  
  // Apply final zones + overrides from notes + arrows
  rows = applyFinalRulesFromNotes(seasonKey, divisionName, lastLeagueDate, rows);

  els.tbody.innerHTML = '';
  const frag = document.createDocumentFragment();
  rows.forEach((r, idx)=> frag.appendChild(buildDerivedFinalRow(r, idx, seasonKey)));
  els.tbody.appendChild(frag);

  // Keep dotted cut lines on derived finals (use seasonFormat first, else infer from final tables)
  const cutRules =
    cutsFromSeasonFormats(seasonKey, divisionName, rows.length) ||
    inferCutsFromFinal(seasonKey, divisionName);

  applyCutLinesToRenderedTable(cutRules);

  // Final notes = dated up to end-of-season + undated included
  const notesAsOf = getLastLeagueDateForSeasonDivision(seasonKey, divisionName) || lastLeagueDate || '9999-12-31';
  renderSeasonDivisionNotesAndRefs(seasonKey, divisionName, notesAsOf, true);
  
  rebuildLegend();

function inferPlayoffLinesFromNotes(seasonKey, divisionName){
  // Prefer explicit seasonFormat rules (season-notes.json -> seasonFormat array)
  const fmt = state.seasonFormats.get(String(seasonKey))?.get(String(divisionName)) || null;
  if (!fmt) return null;

  const poSemi = Number(fmt.playoffsSemi || 0);
  const poElim = Number(fmt.playoffsElim || 0);

  // 4-team playoffs: positions 2–5
  if (poSemi === 0 && poElim === 4) return { playoffCut: 5, byeCut: null };

  // 6-team playoffs: positions 2–3 byes; 4–7 eliminators
  if (poSemi === 2 && poElim === 4) return { playoffCut: 7, byeCut: 3 };

  return null;
}

function inferPlayoffLinesFromFinalClasses(seasonKey, divisionName){
  const season = state.finalByKey[seasonKey];
  const div = season?.divisions?.[divisionName];
  const rows = Array.isArray(div?.rows) ? div.rows : [];

  // IMPORTANT:
  // Only infer play-offs from explicit 'playoff' classes.
  // Do NOT use 'promoted' for inference because some seasons/tables may use it for automatic promotion,
  // which would create "phantom playoffs" (e.g., 1979-80).
  const cohortPos = rows
    .filter(r => {
      const cls = r.classes || [];
      return cls.includes('playoff');
    })
    .map(r => Number(r.pos))
    .filter(n => Number.isFinite(n) && n >= 2); // exclude champion

  if (!cohortPos.length) return null;

  const maxPos = Math.max(...cohortPos);

  // If final table shows positions through 7 => six-team format (2-3 byes, 4-7 eliminators)
  if (maxPos >= 7) return { playoffCut: 7, byeCut: 3 };

  // If final table shows positions through 5 => four-team format (2-5)
  if (maxPos >= 5) return { playoffCut: 5, byeCut: null };

  return null;
}
      
function inferCutsFromFinal(seasonKey, divisionName){
  if (!state.cutsBySeason.has(seasonKey)) state.cutsBySeason.set(seasonKey, new Map());
  const seasonMap = state.cutsBySeason.get(seasonKey);
  if (seasonMap.has(divisionName)) return seasonMap.get(divisionName);

  const season = state.finalByKey[seasonKey];
  const div = season?.divisions?.[divisionName];
  const rows = Array.isArray(div?.rows) ? div.rows : [];

  // --- relegation (your “from bottom” rule) ---
  const relegatedPos = rows
    .filter(r => (r.classes || []).includes('relegated'))
    .map(r => Number(r.pos))
    .filter(n => Number.isFinite(n));

  const teamCount = rows.length;
  const relegatedCount = relegatedPos.length;
  const relegationCut = (relegatedCount && teamCount)
    ? (teamCount - relegatedCount)
    : null;

  // --- champion dotted line always under 1st ---
  const championCut = 1;

  // --- playoff dotted lines: notes-first, fallback to final classes ---
  const fromNotes = inferPlayoffLinesFromNotes(seasonKey, divisionName);
  const fromFinal = inferPlayoffLinesFromFinalClasses(seasonKey, divisionName);
  const playoffs = fromNotes || fromFinal; // notes override

  const playoffCut = playoffs ? playoffs.playoffCut : null;
  const byeCut = playoffs ? playoffs.byeCut : null;

  const cuts = {
    champion: championCut,
    playoff: playoffCut,
    playoffByes: byeCut,
    relegation: relegationCut
  };

  seasonMap.set(divisionName, cuts);
  return cuts;
}
function getPlayoffFormatForSeason(seasonKey, divisionName){
  // Prefer explicit seasonFormat rules; fall back to inferred cuts.
  const fmt = state.seasonFormats.get(String(seasonKey))?.get(String(divisionName)) || null;

  // 4-team playoffs: positions 2–5 (all treated as “semi” tier)
  if (fmt && Number(fmt.playoffsSemi || 0) === 0 && Number(fmt.playoffsElim || 0) === 4){
    return { fieldEnd: 5, byeEnd: null };
  }

  // 6-team playoffs: positions 2–3 byes (semi), 4–7 eliminators
  if (fmt && Number(fmt.playoffsSemi || 0) === 2 && Number(fmt.playoffsElim || 0) === 4){
    return { fieldEnd: 7, byeEnd: 3 };
  }

  const cuts = inferCutsFromFinal(seasonKey, divisionName);
  if (!cuts || !cuts.playoff) return null;

  // If we can infer 7 + bye at 3 => 6-team, else 5 => 4-team
  if (cuts.playoff === 7) return { fieldEnd: 7, byeEnd: 3 };
  if (cuts.playoff === 5) return { fieldEnd: 5, byeEnd: null };

  return null;
}
      
function applyCutLinesToRenderedTable(cuts){
  Array.from(els.tbody.rows).forEach(tr=>{
    tr.classList.remove(
      'cut-champion-after',
      'cut-playoff-after',
      'cut-playoff-byes-after',
      'cut-relegation-after'
    );
  });

  if (!cuts) return;

  const byPos = new Map();
  Array.from(els.tbody.rows).forEach(tr=>{
    const posCell = tr.cells && tr.cells[0];
    const pos = posCell ? Number(String(posCell.textContent||'').trim()) : NaN;
    if (Number.isFinite(pos)) byPos.set(pos, tr);
  });

  if (cuts.champion && byPos.has(cuts.champion)) byPos.get(cuts.champion).classList.add('cut-champion-after');
  if (cuts.playoffByes && byPos.has(cuts.playoffByes)) byPos.get(cuts.playoffByes).classList.add('cut-playoff-byes-after');
  if (cuts.playoff && byPos.has(cuts.playoff)) byPos.get(cuts.playoff).classList.add('cut-playoff-after');
  if (cuts.relegation && byPos.has(cuts.relegation)) byPos.get(cuts.relegation).classList.add('cut-relegation-after');
}

function populateAsOf(seasonKey, divisionName){
  const season = state.byKey[seasonKey];
  if (!season) return;

  const div = season.divisions?.[divisionName];
  const matches = Array.isArray(div?.matches) ? div.matches : [];

  // League dates (exclude play-offs)
  const leagueMatches = matches.filter(m => !m?.playoffs && !m?.playoff_round);
  const leagueDates = Array.from(
    new Set(leagueMatches.map(m => toISO(m.date)).filter(Boolean))
  ).sort((a,b)=> isoToNum(a) - isoToNum(b));

  const sel = els.asofSel;
  sel.innerHTML = '';

  // Track last regular-season league date (used by derived standings engine)
  const lastLeagueDate = leagueDates.length ? leagueDates[leagueDates.length - 1] : null;
  state.current.lastLeagueDate = lastLeagueDate;

  // Detect whether play-offs exist (prefer seasonFormat, but also allow data-driven detection)
  const fmt = state.seasonFormats.get(String(seasonKey))?.get(String(divisionName)) || null;
  const playoffsExistByFormat = !!(fmt && (Number(fmt.playoffsElim || 0) > 0 || Number(fmt.playoffsSemi || 0) > 0));

  const playoffDates = matches
    .filter(m => (m?.playoffs || m?.playoff_round))
    .map(m => toISO(m.date))
    .filter(Boolean)
    .sort((a,b)=> isoToNum(a) - isoToNum(b));

  const playoffsExistByData = playoffDates.length > 0;
  const hasPlayoffs = playoffsExistByFormat || playoffsExistByData;

  // Season-final date (for LABELS only):
  // If play-offs exist, this is the last play-off date; otherwise it's last league date.
  const seasonFinalDate = hasPlayoffs
    ? (playoffDates.length ? playoffDates[playoffDates.length - 1] : lastLeagueDate)
    : lastLeagueDate;

  // Show all league dates except the last one (keeps selector usable)
  const visibleDates = (leagueDates.length > 1) ? leagueDates.slice(0, -1) : [];
  visibleDates.forEach(d=>{
    sel.appendChild(createEl('option', { value:d, textContent: formatISODateShort(d) }));
  });

  // ----- DERIVED OPTIONS (date-led wording applies ONLY here) -----

  // If play-offs exist, offer:
  // 1) end of regular season (last league date)
  // 2) season final (last play-off date)
  if (hasPlayoffs && lastLeagueDate){
    const prettyRegularEnd = formatISODateShort(lastLeagueDate);
    sel.appendChild(createEl('option', { value:'__DERIVED_REGULAR_END__', textContent:`${prettyRegularEnd} (end of regular season)` }));
  }

  if (seasonFinalDate){
    const prettySeasonFinal = formatISODateShort(seasonFinalDate);
    const suffix = hasPlayoffs ? 'season final' : 'final standings';
    sel.appendChild(createEl('option', { value:'__FINAL_DERIVED__', textContent:`${prettySeasonFinal} (${suffix})` }));
  }

  // ----- REFERENCE OPTION (always last) -----
  sel.appendChild(createEl('option', { value:'__FINAL_TABLES__', textContent:'Reference - from league-tables.json' }));

  // Default should be the derived season-final option (if present), else reference.
  const allValues = Array.from(sel.options).map(o => o.value);
  const desired =
    (allValues.includes('__FINAL_DERIVED__') ? '__FINAL_DERIVED__' :
     allValues.includes('__FINAL_TABLES__') ? '__FINAL_TABLES__' :
     (allValues[0] || '__FINAL_TABLES__'));

  sel.value = desired;
  state.current.asof = desired;
}

        function initTeamStats(){
          return { P:0, W:0, D:0, L:0, GF:0, GA:0, GD:0, Pts:0 };

        function addMatch(statsByTeam, home, away, hg, ag, ptsWin){
          if (!statsByTeam.has(home)) statsByTeam.set(home, initTeamStats());
          if (!statsByTeam.has(away)) statsByTeam.set(away, initTeamStats());

          const H = statsByTeam.get(home);
          const A = statsByTeam.get(away);

          H.P += 1; A.P += 1;
          H.GF += hg; H.GA += ag;
          A.GF += ag; A.GA += hg;

          if (hg > ag){
            H.W += 1; A.L += 1;
            H.Pts += ptsWin;
          } else if (hg < ag){
            A.W += 1; H.L += 1;
            A.Pts += ptsWin;
          } else {
            H.D += 1; A.D += 1;
            H.Pts += 1;
            A.Pts += 1;
          }
        }

        function computeStandings(seasonKey, divisionName, asOfISO){
          const season = state.byKey[seasonKey];
          const div = season?.divisions?.[divisionName];
          const matches = Array.isArray(div?.matches) ? div.matches : [];

          const ptsWin = pointsForWin(seasonKey);
          const asNum = isoToNum(asOfISO);

          // Expunged teams *as of* this date
          const expSet = expungedTeamsFor(seasonKey, divisionName, asOfISO, false);
          
          // Collect all teams mentioned (so expunged teams still appear)
          const allTeams = new Set();
          for (const m of matches){
            const h = String(m.home || '').trim();
            const a = String(m.away || '').trim();
            if (h) allTeams.add(h);
            if (a) allTeams.add(a);
          }

          // Stats excluding expunged-team fixtures (if expunged has happened by asOf)
          const stats = new Map();

for (const m of matches){
  // IMPORTANT: never count play-offs in league standings
  if (m?.playoffs || m?.playoff_round) continue;

  const dateISO = toISO(m.date);
  if (!dateISO) continue;
  if (isoToNum(dateISO) > asNum) continue;

  const h = String(m.home || '').trim();
  const a = String(m.away || '').trim();
  if (!h || !a) continue;

  // If either team is expunged (by this asOf), remove the fixture entirely
  if (expSet.has(canon(h)) || expSet.has(canon(a))) continue;

  const hg = Number(m.home_goals);
  const ag = Number(m.away_goals);

  // Only count played games (both numeric)
  if (!Number.isFinite(hg) || !Number.isFinite(ag)) continue;

  addMatch(stats, h, a, hg, ag, ptsWin);
}
          
          // Build rows
          const rows = [];
          for (const team of allTeams){
            const s = stats.get(team) || initTeamStats();
            s.GD = s.GF - s.GA;

            const isExp = expSet.has(canon(team));
            if (isExp){
              // Once expunged: show zeros (and stay there)
              rows.push({
                team,
                P:0,W:0,D:0,L:0,GF:0,GA:0,GD:0,Pts:0,
                classes:['expunged']
              });
            } else {
              rows.push({
                team,
                P:s.P, W:s.W, D:s.D, L:s.L, GF:s.GF, GA:s.GA, GD:s.GD, Pts:s.Pts,
                classes:[]
              });
            }
          }

          // Sort (Pts, GD, GF, Team)
          rows.sort((a,b)=>{
            if (b.Pts !== a.Pts) return b.Pts - a.Pts;
            if (b.GD !== a.GD) return b.GD - a.GD;
            if (b.GF !== a.GF) return b.GF - a.GF;
            return String(a.team).localeCompare(String(b.team));
          });

          // Positions
          rows.forEach((r, i)=> r.pos = i + 1);

          return rows;
        }
        function applyPointsAdjustments(seasonKey, divisionName, asOfISO, rows, includeUndated){
          const notes = activeNotesFor(seasonKey, divisionName, asOfISO, includeUndated)
            .filter(n => n.type === 'points_deduction' && Number.isFinite(n.pointsValue));

          if (!notes.length) return rows;

          const deltaByTeam = new Map(); // canon(entity) -> sum pointsValue
          for (const n of notes){
            const k = canon(n.entity || '');
            if (!k) continue;
            deltaByTeam.set(k, (deltaByTeam.get(k) || 0) + Number(n.pointsValue));
          }
          
          // apply
          rows.forEach(r=>{
            const k = canon(r.team);
            if (!deltaByTeam.has(k)) return;
            r.Pts = Number(r.Pts || 0) + deltaByTeam.get(k);
          });

          // re-sort and re-rank
          rows.sort((a,b)=>{
            if (b.Pts !== a.Pts) return b.Pts - a.Pts;
            if (b.GD !== a.GD) return b.GD - a.GD;
            if (b.GF !== a.GF) return b.GF - a.GF;
            return String(a.team).localeCompare(String(b.team));
          });
          rows.forEach((r,i)=> r.pos = i + 1);

          return rows;
        }
      
        // =========================
        // Render
        // =========================
        function rowIdFor(slug, label){
          return slug ? ('row-' + slug) : ('row-' + slugify(label || ''));
        }

function buildRow(r, idx, seasonKey){
  // Prefer meta-based display name if we can map entity/team -> slug
  const rawName = String(r.team || '').trim();
  const slug = bestEffortSlugFromName(rawName, seasonKey) || '';

  const label = slug ? displayNameForSeason(slug, seasonKey) : rawName;
  
          const tr = document.createElement('tr');
          tr.id = rowIdFor(slug, label);

          if (slug) tr.setAttribute('data-team-slug', slug);

          (r.classes || []).forEach(c => tr.classList.add(c));

          // Zebra only if not special
          const hasSpecial =
            tr.classList.contains('champion') ||
            tr.classList.contains('promoted') ||
            tr.classList.contains('playoff') ||
            tr.classList.contains('relegated') ||
            tr.classList.contains('folded') ||
            tr.classList.contains('expunged') ||
            tr.classList.contains('clinched-champion') ||
            tr.classList.contains('clinched-po-semi') ||
            tr.classList.contains('clinched-po-elim') ||
            tr.classList.contains('clinched-relegated');

          if (!hasSpecial){
            tr.classList.add((idx % 2 === 0) ? 'zebra-odd' : 'zebra-even');
          }

          tr.style.setProperty('--i', idx);
          tr.classList.add('anim-in');

          // Movement column: kept for layout but blank in dynamic mode
          const cells = [
            r.pos,
            { move:'' },
            label,
            r.P, r.W, r.D, r.L, r.GF, r.GA,
            { gd:r.GD },
            r.Pts
          ];

          cells.forEach((val, i)=>{
            const td = document.createElement('td');

            if (i === 1){
              td.classList.add('move-col');
              setText(td, '');
              td.classList.add('move-none');
              tr.appendChild(td);
              return;
            }

            if (i === 9){
              let gd = Number((val && typeof val === 'object') ? val.gd : val);
              if (!isFinite(gd)) gd = 0;
              setText(td, gd > 0 ? ('+' + gd) : String(gd));
              td.classList.add(classForGD(gd));
              tr.appendChild(td);
              return;
            }
            
            setText(td, (val != null ? val : ''));
            tr.appendChild(td);
          });

          return tr;
        }

function rebuildLegend(){
  const rows = Array.from(els.tbody.rows);

  const has = {
    championFinal: rows.some(r=> r.classList.contains('champion')),
    promotedFinal: rows.some(r=> r.classList.contains('promoted')),
    playoffFinal: rows.some(r=> r.classList.contains('playoff')),
    playoffSemiFinal: rows.some(r=> r.classList.contains('playoff-semi')),
    playoffElimFinal: rows.some(r=> r.classList.contains('playoff-elim')),
    relegatedFinal: rows.some(r=> r.classList.contains('relegated')),

    clinchedChampion: rows.some(r=> r.classList.contains('clinched-champion')),
    clinchedPoSemi: rows.some(r=> r.classList.contains('clinched-po-semi')),
    clinchedPoElim: rows.some(r=> r.classList.contains('clinched-po-elim')),
    clinchedRelegated: rows.some(r=> r.classList.contains('clinched-relegated')),

    folded: rows.some(r=> r.classList.contains('folded')),
    expunged: rows.some(r=> r.classList.contains('expunged'))
  };

  const isFinalTable = has.promotedFinal || has.playoffFinal || has.relegatedFinal || has.championFinal;

  els.legend.replaceChildren(createEl('strong',{textContent:'Legend:'}), document.createTextNode(' '));
  const parts = [];

  if (isFinalTable){
    if (has.championFinal) parts.push(['gold','Champions']);
    if (has.promotedFinal) parts.push(['silver','Play-off Winner']);

    // Distinguish byes/SF vs eliminator qualifiers when both exist
    if (has.playoffSemiFinal) parts.push(['po-semi','Qualified for Play-off Semi-finals']);
    if (has.playoffElimFinal) parts.push(['po-elim','Qualified for Play-off Eliminators']);

    // Fallback: if somehow only generic playoff exists without tier classes
    if (!has.playoffSemiFinal && !has.playoffElimFinal && has.playoffFinal){
      parts.push(['po-elim','Qualified for Play-offs']);
    }

    if (has.relegatedFinal) parts.push(['pink','Relegated']);
  } else {
    if (has.clinchedChampion) parts.push(['gold','Champions']);
    if (has.clinchedPoSemi) parts.push(['po-semi','Qualified for Play-off Semi-finals']);
    if (has.clinchedPoElim) parts.push(['po-elim','Qualified for Play-off Eliminators']);
    if (has.clinchedRelegated) parts.push(['pink','Relegation zone']);
  }
  
  if (has.folded) parts.push(['black','Folded']);
  if (has.expunged) parts.push(['grey','Expunged']);

  if (!parts.length){
    els.legend.style.display = 'none';
    return;
  }
  els.legend.style.display = '';
  parts.forEach(([cls,label],i)=>{
    els.legend.appendChild(createEl('span',{ class:'swatch '+cls, 'aria-hidden':'true' }));
    els.legend.appendChild(document.createTextNode(label));
    if (i < parts.length - 1) els.legend.appendChild(document.createTextNode(', '));
  });
}
      
        function renderTable(seasonKey, preferredDivision, asOfISO){
          try{
            const season = state.byKey[seasonKey];
            if (!season) return;

            const divNames = Object.keys(season.divisions || {});
            const pickFirst = () =>
              divNames.includes('National') ? 'National' :
              divNames.includes('North') ? 'North' :
              divNames.includes('South') ? 'South' :
              divNames[0];

            const chosenDiv = preferredDivision || state.current.division || pickFirst();

            state.current.season = seasonKey;
            state.current.division = chosenDiv;

            renderPills(season.divisions, seasonKey);

            Array.from(els.pills.querySelectorAll('button')).forEach(b=>{
              b.setAttribute('aria-pressed', b.textContent === chosenDiv ? 'true' : 'false');
            });

            // As-of options depend on season+division
            populateAsOf(seasonKey, chosenDiv);

            // Respect requested asOf if provided and exists in selector
            if (asOfISO){
              const opt = Array.from(els.asofSel.options).some(o => o.value === asOfISO);
              if (opt){
                els.asofSel.value = asOfISO;
                state.current.asof = asOfISO;
              }
            }

const effectiveAsOf = state.current.asof || els.asofSel.value;
state.current.asof = effectiveAsOf;

const leagueTitle = leagueTitleFromFinalTables(seasonKey, chosenDiv);

if (effectiveAsOf === '__DERIVED_REGULAR_END__'){
  // End of regular season (derived from last league date + notes)
  setText(els.caption, leagueTitle + ' (end of regular season)');
  renderDerivedFinalTable(seasonKey, chosenDiv);

} else if (effectiveAsOf === '__FINAL_DERIVED__'){
  // Season end context (derived table; still computed from last league date + notes)
  const label = (state.current.lastLeagueDate ? 'final standings' : 'season final');
  setText(els.caption, leagueTitle + ` (${label})`);
  renderDerivedFinalTable(seasonKey, chosenDiv);

} else if (effectiveAsOf === '__FINAL_TABLES__'){
  // Reference – from league-tables.json
  setText(els.caption, leagueTitle + ' (reference)');
  renderFinalTable(seasonKey, chosenDiv);

} else {
  
  // Date-specific standings: computed from results.json
  let asOfISO = effectiveAsOf;
  
  const prettyAsOf = formatISODateShort(asOfISO);
  setText(els.caption, `${leagueTitle} (as of ${prettyAsOf})`);

  // Compute + render from results.json (league-only; play-offs excluded)
  els.tbody.innerHTML = '';

  const seasonObj = state.byKey[seasonKey];
  const divObj = seasonObj?.divisions?.[chosenDiv];
  const matches = Array.isArray(divObj?.matches) ? divObj.matches : [];

  let rows = computeStandings(seasonKey, chosenDiv, asOfISO);

  // Apply points deductions that are active as-of this date (undated notes do NOT apply mid-season)
  rows = applyPointsAdjustments(seasonKey, chosenDiv, asOfISO, rows, false);

  // Apply clinched statuses ONLY (nothing is shown until mathematically secured)
  rows = applyClinchedEmphasis(seasonKey, chosenDiv, asOfISO, rows, matches);
  
  const frag = document.createDocumentFragment();
  rows.forEach((r, idx) => frag.appendChild(buildRow(r, idx, seasonKey)));
  els.tbody.appendChild(frag);

  // Apply dotted cut lines in computed tables:
  // prefer seasonFormat rules; if missing, fall back to inference from final table classes/notes
  const cutRules =
    cutsFromSeasonFormats(seasonKey, chosenDiv, rows.length) ||
    inferCutsFromFinal(seasonKey, chosenDiv);

  applyCutLinesToRenderedTable(cutRules);
  
  renderSeasonDivisionNotesAndRefs(seasonKey, chosenDiv, asOfISO, false);
  rebuildLegend();
}
            
            if (els.seasonSel.value !== seasonKey) els.seasonSel.value = seasonKey;

          } catch(e){
            showErr('Render error', e.message || String(e));
          }
        }

        // =========================
        // Fetch helpers
        // =========================
        async function safeJson(res){
          try{ return await res.json(); }
          catch{
            const txt = await res.text();
            const s = txt.indexOf('{'), e = txt.lastIndexOf('}');
            if (s >= 0 && e > s) return JSON.parse(txt.slice(s, e + 1));
            throw new Error('Invalid JSON');
          }
        }

        async function fetchOptionalJson(url){
          try{
            const res = await fetch(url + (url.includes('?')?'&':'?') + 'v=' + Date.now(), { cache:'no-store', credentials:'omit' });
            if (!res.ok) return null;
            return await safeJson(res);
          } catch {
            return null;
          }
        }

        // =========================
        // Boot
        // =========================
        async function boot(){
          const loading = document.createElement('option');
          loading.textContent = 'Loading…';
          loading.disabled = true;
          loading.selected = true;
          els.seasonSel.appendChild(loading);

          try{
const [resultsRes, tablesRes, metaRes, notesRes, expulsionsRaw] = await Promise.all([
  fetch(RESULTS_SRC + (RESULTS_SRC.includes('?')?'&':'?') + 'v=' + Date.now(), { cache:'no-store', credentials:'omit' }),
  fetch(TABLES_SRC  + (TABLES_SRC.includes('?')?'&':'?')  + 'v=' + Date.now(), { cache:'no-store', credentials:'omit' }),
  fetchOptionalJson(CLUBS_META_SRC),
  fetchOptionalJson(SEASON_NOTES_SRC),
  fetchOptionalJson(EXPULSIONS_SRC)
]);
            if (!resultsRes.ok) throw new Error('Results: ' + resultsRes.status + ' ' + resultsRes.statusText);

            const resultsRaw = await safeJson(resultsRes);
            
if (!tablesRes.ok) throw new Error('Tables: ' + tablesRes.status + ' ' + tablesRes.statusText);

const tablesRaw = await safeJson(tablesRes);

// Index final tables
const finalItems = normalizeTables(tablesRaw);
if (!finalItems.length){
  showErr('No seasons found in league-tables.json.', 'Expected seasons/divisions/rows.');
  return;
}
buildFinalIndex(finalItems);
            
            // Index main results
            const items = normalizeResults(resultsRaw);
            if (!items.length){
              showErr('No seasons found in results.json.', 'Expected { "seasons":[ ... ] }');
              return;
            }
            buildIndex(items);
            populateSeasons();

            // Optional indexes
            if (metaRes) indexMeta(metaRes);
            if (notesRes) indexSeasonNotes(notesRes);
            if (expulsionsRaw) indexExpulsions(expulsionsRaw);

            // Initial render (earliest season, first division, end-of-season date)
            const initialSeason = state.seasons[0].season;
            if (notesRes) indexSeasonFormats(notesRes);
            els.seasonSel.value = initialSeason;

            // Choose division now so we can populate as-of
            const initialDivNames = Object.keys(state.byKey[initialSeason].divisions || {});
            const initialDiv =
              initialDivNames.includes('National') ? 'National' :
              initialDivNames.includes('North') ? 'North' :
              initialDivNames.includes('South') ? 'South' :
              initialDivNames[0];

            state.current.season = initialSeason;
            state.current.division = initialDiv;

state.current.asof = '__FINAL_DERIVED__';
renderTable(initialSeason, initialDiv, '__FINAL_DERIVED__');
            
els.seasonSel.addEventListener('change', ()=>{
  const s = els.seasonSel.value;
  state.current.season = s;

  // reset division to preferred default when season changes
  const dn = Object.keys(state.byKey[s].divisions || {});
  const d =
    dn.includes('National') ? 'National' :
    dn.includes('North') ? 'North' :
    dn.includes('South') ? 'South' :
    dn[0];

  state.current.division = d;

  // Default: derived season final (populateAsOf will set this)
  state.current.asof = '__FINAL_DERIVED__';

  renderTable(s, d, '__FINAL_DERIVED__');
});
els.asofSel.addEventListener('change', ()=>{
  const v = els.asofSel.value;

  state.current.asof = v;
  renderTable(state.current.season, state.current.division, v);
});
            
            clearErr();

          } catch(err){
            showErr('Could not load data.', err.message || String(err));
          }
        }

        if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', boot);
        else boot();
      })();
    </script>

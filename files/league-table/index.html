<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>National League Archive — Standings (Dynamic from results.json) (v3.38d)</title>
    <meta name="color-scheme" content="light" />
    <style>
      :root{
        color-scheme: light;
        --cap-bg:#9e0000; --cap-fg:#fff;
        --head-bg:#000; --head-fg:#fff;
        --zebra-odd:#f6f6f6; --zebra-even:#fff;

        --gold:gold;
        --silver:#c0c0c0;
        --pink:#ffe0e6;

        --po-elim:#e7f7ea;
        --po-semi:#bfe9c8;

        --gd-pos:#0a7d2a; --gd-zero:#555; --gd-neg:#b00020;
        --ring:#d0d7de;
      }

      body{ margin:0; }
      .wrap, .wrap *{ font-family:inherit; }

      .wrap{ max-width:1200px; margin:0 auto; padding:12px 8px; }
      .controls{ display:flex; gap:.75rem; align-items:center; margin:.5rem 0 .75rem; flex-wrap:wrap; }
      .controls label{ font-weight:600; }
      .controls select{
        padding:6px 10px; border:1px solid var(--ring); border-radius:8px;
        background:#fff; font:inherit;
      }
      .controls .spacer{ flex:1 1 auto; }

      .pillbar{ display:none; gap:.5rem; flex-wrap:wrap; margin:.25rem 0 .5rem; }
      .pillbar button{
        border:1px solid var(--ring);
        background:#fff;
        border-radius:999px;
        padding:6px 12px;
        cursor:pointer;
        font:inherit;
      }
      .pillbar button[aria-pressed="true"]{ background:#111; color:#fff; border-color:#111; }
      .pillbar[data-era="post"] button[aria-pressed="true"]{ background:#9e0000; border-color:#9e0000; color:#fff; }

      .table-wrap{
        max-width:100%;
        overflow-x:auto;
        -webkit-overflow-scrolling:touch;
        border-radius:10px;
        box-shadow:0 1px 0 rgba(0,0,0,.05);
      }

      table{ width:100%; border-collapse:collapse; font-variant-numeric:tabular-nums; }
      caption{
        background:var(--cap-bg);
        color:var(--cap-fg);
        text-align:center;
        font-weight:700;
        padding:10px;
        caption-side:top;
        font-size:1.1rem;
        letter-spacing:.2px;
      }
      thead th{
        position:sticky;
        top:0;
        z-index:1;
        background:var(--head-bg);
        color:var(--head-fg);
        text-transform:uppercase;
        font-size:.85rem;
        letter-spacing:.3px;
      }
      th,td{
        padding:8px 10px;
        border:none;
        vertical-align:middle;
        text-align:center;
        white-space:nowrap;
        font:inherit;
      }
      th:nth-child(3), td:nth-child(3){ text-align:left; white-space:normal; }
      th:nth-child(n+4), td:nth-child(n+4){ text-align:right; }

      th.move-col, td.move-col{ width:1.8ch; padding-left:4px; padding-right:4px; text-align:center; }
      td.move-col{ font-weight:700; }
      .move-up{ color:var(--gd-pos); }
      .move-down{ color:var(--gd-neg); }
      .move-none{ opacity:.35; }

      tbody tr{ background:var(--row-bg, transparent); }
      tbody tr.champion{ --row-bg:var(--gold); color:#000; }
      tbody tr.promoted{ --row-bg:var(--silver); color:#000; }
      tbody tr.playoff-semi{ --row-bg:var(--po-semi); color:#000; }
      tbody tr.playoff-elim{ --row-bg:var(--po-elim); color:#000; }
      tbody tr.relegated{ --row-bg:var(--pink); color:#000; }
      tbody tr.relegation-zone{ --row-bg:var(--pink); color:#000; }
      tbody tr.folded{ --row-bg:#000; color:#fff; }
      tbody tr.zebra-odd{ --row-bg:var(--zebra-odd); }
      tbody tr.zebra-even{ --row-bg:var(--zebra-even); }
      tbody tr.expelled{ --row-bg:#555; color:#fff; }
      
      tbody tr.cut-champion-after td{ border-bottom:2px dotted #333; }
      tbody tr.cut-automatic-after td{ border-bottom:2px dotted #333; }
      tbody tr.cut-playoff-byes-after td{ border-bottom:2px dotted #333; }
      tbody tr.cut-playoff-after td{ border-bottom:2px dotted #333; }
      tbody tr.cut-relegation-after td{ border-bottom:2px dotted #333; }

      tbody tr.folded td,
      tbody tr.expelled td{ color:#fff !important; }

      tbody tr.folded td.gd-pos,
      tbody tr.folded td.gd-zero,
      tbody tr.folded td.gd-neg,
      tbody tr.expelled td.gd-pos,
      tbody tr.expelled td.gd-zero,
      tbody tr.expelled td.gd-neg{ color:#fff !important; }

      tbody tr.folded .move-up,
      tbody tr.folded .move-down,
      tbody tr.folded .move-none,
      tbody tr.expelled .move-up,
      tbody tr.expelled .move-down,
      tbody tr.expelled .move-none{
        color:#fff !important;
        opacity:1;
      }

      td.gd-pos{ color:var(--gd-pos); font-weight:400; }
      td.gd-zero{ color:var(--gd-zero); font-weight:400; }
      td.gd-neg{ color:var(--gd-neg); font-weight:400; }

      th.strongcol, td.strongcol{ font-weight:700; }

      .legend{
        font-size:.9rem;
        color:#555;
        margin-top:.5rem;
      }
      .legend .swatch{
        display:inline-block;
        width:.9em;
        height:.9em;
        border-radius:3px;
        margin:0 .35rem -.12rem .35rem;
        box-shadow:
          0 0 0 1.5px rgba(0,0,0,.20),
          0 1px 2px rgba(0,0,0,.25);
      }
      .legend .gold{ background:var(--gold); }
      .legend .silver{ background:var(--silver); }
      .legend .po-semi{ background:var(--po-semi); }
      .legend .po-elim{ background:var(--po-elim); }
      .legend .pink{ background:var(--pink); }
      .legend .black{ background:#000; }
      .legend .grey{ background:#555; }

      .error{
        display:none;
        background:#ffe9ec;
        color:#b00020;
        border:1px solid #f0b9c2;
        padding:8px 10px;
        border-radius:8px;
        margin:.5rem 0;
        font-weight:600;
        white-space:pre-wrap;
      }

      .season-note{
        margin-top:.5rem;
        padding:10px 12px;
        border-left:4px solid #9e0000;
        background:#f8f8f8;
        color:#222;
        box-shadow:0 1px 2px rgba(0,0,0,.06);
      }
      .season-note[hidden]{ display:none; }

      tbody tr.clinched-champion{ --row-bg:var(--gold); color:#000; }
      tbody tr.clinched-po-semi{ --row-bg:var(--po-semi); color:#000; }
      tbody tr.clinched-po-elim{ --row-bg:var(--po-elim); color:#000; }
      tbody tr.clinched-relegated{ --row-bg:var(--pink); color:#000; }

      .note-line{ white-space:normal; margin:2px 0; }

      tbody tr.clinched-po-semi{
        background-image: linear-gradient(to right, rgba(0,96,32,.60) 0, rgba(0,96,32,.60) 4px, transparent 4px);
        background-repeat: no-repeat;
      }
      tbody tr.clinched-po-elim{
        background-image: linear-gradient(to right, rgba(0,96,32,.28) 0, rgba(0,96,32,.28) 4px, transparent 4px);
        background-repeat: no-repeat;
      }

      .note-line.note-flash{ animation: noteGlow 1200ms ease-out; }
      @keyframes noteGlow { from{ background:#fff4cc; } to{ background:transparent; } }

      .note-ref{
        font-size:.68em;
        line-height:1;
        vertical-align:.2em;
        opacity:.6;
        cursor:pointer;
      }
      .note-ref a, .note-ref span{
        text-decoration:none;
        display:inline-block;
        min-width:.9ch;
        text-align:center;
      }
      .note-ref a{ cursor:pointer; }
      .note-ref + *{ margin-left:.15em; }
      td:nth-child(3) .note-ref{ margin-left:.15em; }

      @keyframes rowGlow {
        0%{ box-shadow: inset 0 0 0 3px rgba(255,204,0,.95); }
        100%{ box-shadow: inset 0 0 0 3px rgba(255,204,0,0); }
      }
      tr.row-flash{ animation: rowGlow 1400ms ease-out; }

      @keyframes rowFade { from { opacity:0; } to { opacity:1; } }
      tbody tr.anim-in{
        opacity:0;
        animation: rowFade 260ms ease-out forwards;
        animation-delay: calc(var(--i, 0) * 35ms);
        will-change: opacity;
      }
      @media (prefers-reduced-motion: reduce){
        tbody tr.anim-in{ animation:none; opacity:1; }
      }

      @media (max-width: 1100px){
        th:nth-child(6), td:nth-child(6),
        th:nth-child(7), td:nth-child(7),
        th:nth-child(9), td:nth-child(9){ display:none; }
      }
      @media (max-width: 980px){ th:nth-child(8), td:nth-child(8){ display:none; } }
      @media (max-width: 860px){ th:nth-child(5), td:nth-child(5){ display:none; } }
      @media (max-width: 740px){ th:nth-child(4), td:nth-child(4){ display:none; } }
      @media (max-width: 620px){ th:nth-child(10), td:nth-child(10){ display:none; } }
    </style>
  </head>

  <body>
    <div class="wrap">
      <div class="controls">
        <label for="season-select">Season:</label>
        <select id="season-select" aria-label="Select season"></select>

        <label for="asof-select">As of:</label>
        <select id="asof-select" aria-label="Select date cut-off"></select>

        <span class="spacer" aria-hidden="true"></span>
      </div>

      <div id="division-pills" class="pillbar" aria-label="Divisions"></div>

      <div id="error" class="error" role="alert" aria-live="assertive"></div>

      <div class="table-wrap">
        <table id="standings" aria-describedby="legend">
          <caption id="table-caption" aria-live="polite">Alliance / Conference / National League — Standings</caption>
          <thead>
            <tr>
              <th scope="col">Pos</th>
              <th scope="col" class="move-col" aria-label="Movement" title="Promotion/Relegation">↕</th>
              <th scope="col">Team</th>
              <th scope="col"><abbr title="Played">P</abbr></th>
              <th scope="col"><abbr title="Wins">W</abbr></th>
              <th scope="col"><abbr title="Draws">D</abbr></th>
              <th scope="col"><abbr title="Losses">L</abbr></th>
              <th scope="col"><abbr title="Goals For">GF</abbr></th>
              <th scope="col"><abbr title="Goals Against">GA</abbr></th>
              <th scope="col"><abbr title="Goal Difference">GD</abbr></th>
              <th scope="col" class="strongcol"><abbr title="Points">Pts</abbr></th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>

      <p class="legend" id="legend" aria-live="polite"><strong>Legend:</strong> </p>
      <div class="season-note" id="season-note" hidden aria-live="polite"></div>
    </div>

    <script>
      (function(){
        const VERSION = 'v3.38d';

        const RESULTS_SRC = "https://raw.githubusercontent.com/rckd-nl/website/main/results.json";
        const TABLES_SRC  = "https://raw.githubusercontent.com/rckd-nl/website/main/league-tables.json";
        // expulsions / expulsions of record are now driven from season-notes.json via type:"expelled"
        const CLUBS_META_SRC = "https://raw.githubusercontent.com/rckd-nl/website/main/clubs-meta.json";
        const SEASON_NOTES_SRC = "https://raw.githubusercontent.com/rckd-nl/website/main/season-notes.json";

        const ASOF_DERIVED_REGULAR_END = '__DERIVED_REGULAR_END__';
        const ASOF_DERIVED_FINAL = '__FINAL_DERIVED__';
        const ASOF_REFERENCE_FINAL = '__FINAL_TABLES__';

        const HIDDEN_DIVISIONS = new Set(['North/South']);

        const $ = s => document.querySelector(s);
        const createEl = (tag, props = {}, children = []) => {
          const el = document.createElement(tag);
          for (const [k, v] of Object.entries(props)){
            if (k === 'class') el.className = v;
            else if (k === 'dataset') Object.assign(el.dataset, v);
            else if (k in el) el[k] = v;
            else el.setAttribute(k, v);
          }
          children.flat().forEach(c => el.appendChild(typeof c === 'string' ? document.createTextNode(c) : c));
          return el;
        };
        const setText = (el, txt) => { el.textContent = String(txt ?? ''); };

        const els = {
          seasonSel: $('#season-select'),
          asofSel: $('#asof-select'),
          pills: $('#division-pills'),
          tbody: $('#standings tbody'),
          caption: $('#table-caption'),
          legend: $('#legend'),
          note: $('#season-note'),
          err: $('#error')
        };

        const state = {
          seasons: [],
          byKey: {},
          finalByKey: {},
          current: {
            season: null,
            division: null,
            asof: null,
            hasPlayoffs: false,
            lastLeagueDate: null,
            seasonFinalDate: null
          },

          metaBySlug: new Map(),
          aliasMap: new Map(),
          seasonNotes: new Map(),
          seasonNotesFull: new Map(),
          // expulsion / expunged-record cases are now fully driven by season-notes.json
          seasonFormats: new Map(),
          seasonTitles: new Map(),
          seasonPoints: new Map()
        };

        const canon = s => String(s || '').toLowerCase().replace(/\s+/g, ' ').trim();
        const slugify = s => canon(s).replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)/g, '');
        const startYear = s => {
          const m = /^(\d{4})/.exec(String(s) || '');
          return m ? +m[1] : 0;
        };
        const classForGD = gd => gd > 0 ? 'gd-pos' : gd < 0 ? 'gd-neg' : 'gd-zero';
        const toISO = s => String(s || '').slice(0, 10);
        const isoToNum = s => {
          const m = /^(\d{4})-(\d{2})-(\d{2})$/.exec(String(s || ''));
          if (!m) return 0;
          return Number(m[1]) * 10000 + Number(m[2]) * 100 + Number(m[3]);
        };

        function showErr(m, d){
          els.err.style.display = 'block';
          setText(els.err, d ? (m + "\n\n" + d) : m);
          console.error(m, d || '');
        }

        function clearErr(){
          els.err.style.display = 'none';
          els.err.textContent = '';
        }

        function formatISODateShort(iso){
          const m = /^(\d{4})-(\d{2})-(\d{2})$/.exec(String(iso || ''));
          if (!m) return String(iso || '');

          const y = +m[1], mo = +m[2], d = +m[3];
          const dt = new Date(Date.UTC(y, mo - 1, d));
          const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
          const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

          return `${days[dt.getUTCDay()]} ${String(d)} ${months[mo - 1]} ${y}`;
        }

        function formatNoteDateSuffix(effectiveDate){
          if (!effectiveDate) return '';
          if (!/^\d{4}-\d{2}-\d{2}$/.test(effectiveDate)) return '';
          const pretty = formatISODateShort(effectiveDate).replace(/^(Sun|Mon|Tue|Wed|Thu|Fri|Sat)\s+/, '');
          return ' on ' + pretty;
        }

        function visibleDivisionNames(divisionsObj){
          return Object.keys(divisionsObj || {}).filter(name => !HIDDEN_DIVISIONS.has(String(name)));
        }

        function normalizeResults(raw){
          if (!raw || !Array.isArray(raw.seasons)) return [];
          return raw.seasons.filter(s => s && s.season && s.divisions);
        }

        function normalizeTables(raw){
          if (!raw || !Array.isArray(raw.seasons)) return [];
          return raw.seasons.filter(s => s && s.season && s.divisions);
        }

        function buildIndex(items){
          const seasons = items.slice().sort((a,b) => startYear(a.season) - startYear(b.season));
          state.seasons = seasons;
          state.byKey = {};
          seasons.forEach(s => state.byKey[s.season] = s);
        }

        function buildFinalIndex(items){
          const seasons = items.slice().sort((a,b) => startYear(a.season) - startYear(b.season));
          state.finalByKey = {};
          seasons.forEach(s => state.finalByKey[s.season] = s);
        }

        function indexMeta(meta){
          state.metaBySlug.clear();
          state.aliasMap.clear();

          const list = Array.isArray(meta?.clubs) ? meta.clubs : [];
          for (const c of list){
            if (!c?.slug) continue;
            if (!c?.primaryName) continue;

            state.metaBySlug.set(c.slug, c);

            const pk = canon(c.primaryName);
            if (!state.aliasMap.has(pk)) state.aliasMap.set(pk, new Set());
            state.aliasMap.get(pk).add(c.slug);

            const rules = Array.isArray(c.displayRules) ? c.displayRules : [];
            for (const r of rules){
              if (!r?.as) continue;
              const k = canon(r.as);
              if (!state.aliasMap.has(k)) state.aliasMap.set(k, new Set());
              state.aliasMap.get(k).add(c.slug);
            }
          }
        }

        function ruleMatchesSeason(rule, seasonKey){
          const y = startYear(seasonKey);
          if (rule.season) return rule.season === seasonKey;
          const fromY = rule.from ? startYear(rule.from) : -Infinity;
          const toY = rule.to ? startYear(rule.to) : Infinity;
          return y >= fromY && y <= toY;
        }

        function resolveTeamSlug(name, seasonKey){
          const k = canon(name);
          const candidates = state.aliasMap.get(k);

          if (!candidates || !candidates.size) return '';
          if (candidates.size === 1) return Array.from(candidates)[0];

          const matched = [];
          for (const slug of candidates){
            const meta = state.metaBySlug.get(slug);
            const rules = Array.isArray(meta?.displayRules) ? meta.displayRules : [];
            if (rules.some(r => r.as && canon(r.as) === k && ruleMatchesSeason(r, seasonKey))){
              matched.push(slug);
            }
          }

          if (matched.length === 1) return matched[0];
          return '';
        }

        function displayNameForSeason(slug, seasonKey, fallbackName){
          if (!slug) return String(fallbackName || '').trim();

          const meta = state.metaBySlug.get(slug);
          if (!meta || !meta.primaryName){
            return String(fallbackName || '').trim();
          }

          const rules = Array.isArray(meta.displayRules) ? meta.displayRules : [];
          const match = rules.find(r => r.as && ruleMatchesSeason(r, seasonKey));
          return match ? match.as : meta.primaryName;
        }

        function rowIdForTeam(slug, label){
          return slug ? ('row-' + slug) : ('row-' + slugify(label || ''));
        }

        function isNoteActiveAsOf(noteObj, asOfISO, includeUndated){
          const ed = noteObj?.effectiveDate;
          if (!ed) return !!includeUndated;
          if (ed === 'start_of_season') return true;
          if (ed === 'end_of_season') return true;
          if (/^\d{4}-\d{2}-\d{2}$/.test(ed)) return isoToNum(ed) <= isoToNum(asOfISO);
          return !!includeUndated;
        }

        function activeNotesFor(seasonKey, divisionName, asOfISO, includeUndated){
          const fm = state.seasonNotesFull.get(String(seasonKey));
          if (!fm) return [];
          const arr = fm.get(String(divisionName)) || [];
          return arr.filter(n => isNoteActiveAsOf(n, asOfISO, includeUndated));
        }

        function indexSeasonNotes(raw){
          state.seasonNotes.clear();
          state.seasonNotesFull.clear();

          const list = Array.isArray(raw?.notes) ? raw.notes : Array.isArray(raw) ? raw : [];

          for (const it of list){
            if (!it?.season || !it?.division) continue;

            const s = String(it.season);
            const d = String(it.division);
            const team = (it.team != null && String(it.team).trim() !== '') ? String(it.team) : '';
            const entity = (it.entity != null && String(it.entity).trim() !== '') ? String(it.entity) : '';
            const noteText = (it.note != null && String(it.note).trim() !== '') ? String(it.note) : '';

            if (team && noteText){
              if (!state.seasonNotes.has(s)) state.seasonNotes.set(s, new Map());
              const dm = state.seasonNotes.get(s);
              if (!dm.has(d)) dm.set(d, []);
              dm.get(d).push({ team, entity, note: noteText });
            }

            if (!state.seasonNotesFull.has(s)) state.seasonNotesFull.set(s, new Map());
            const fm = state.seasonNotesFull.get(s);
            if (!fm.has(d)) fm.set(d, []);

            fm.get(d).push({
              season: s,
              division: d,
              team,
              entity,
              type: String(it.type || 'general').toLowerCase(),
              pointsValue: (it.pointsValue != null && it.pointsValue !== '') ? Number(it.pointsValue) : null,
              effectiveDate: (it.effectiveDate != null && it.effectiveDate !== '') ? String(it.effectiveDate) : null,
              note: noteText
            });
          }
        }

        function parsePlayoffsValue(v){
          if (!v || typeof v !== 'object' || Array.isArray(v)){
            throw new Error('seasonFormat.playoffs must be an object with semi and eliminator');
          }

          const semi = Number(v.semi ?? 0);
          const elim = Number(v.eliminator ?? 0);

          if (!Number.isFinite(semi) || !Number.isFinite(elim)){
            throw new Error('seasonFormat.playoffs contains invalid values');
          }

          return { semi, elim };
        }

        function indexSeasonFormats(raw){
          state.seasonFormats.clear();
          state.seasonTitles.clear();
          state.seasonPoints.clear();

          const list = Array.isArray(raw?.seasonFormat)
            ? raw.seasonFormat
            : Array.isArray(raw?.formats)
              ? raw.formats
              : [];

          for (const it of list){
            if (!it?.season || !it?.division) continue;

            const s = String(it.season);
            const d = String(it.division);
            const champions = Number(it.champions ?? 1);
            const automatic = Number(it.automatic ?? 0);
            const relegation = Number(it.relegation ?? 0);
            const po = parsePlayoffsValue(it.playoffs || { semi:0, eliminator:0 });

            if (!Number.isFinite(champions) || champions < 0) throw new Error(`Invalid champions value for ${s} / ${d}`);
            if (!Number.isFinite(automatic) || automatic < 0) throw new Error(`Invalid automatic value for ${s} / ${d}`);
            if (!Number.isFinite(relegation) || relegation < 0) throw new Error(`Invalid relegation value for ${s} / ${d}`);

            if (!it.points || typeof it.points !== 'object'){
              throw new Error(`Missing points rule in season-notes.json for ${s} / ${d}`);
            }

            const wh = Number(it.points.winHome);
            const wa = Number(it.points.winAway);
            const dr = Number(it.points.draw);
            const ls = Number(it.points.loss);

            if (!Number.isFinite(wh) || !Number.isFinite(wa) || !Number.isFinite(dr) || !Number.isFinite(ls)){
              throw new Error(`Invalid points rule in season-notes.json for ${s} / ${d}`);
            }

            if (!state.seasonFormats.has(s)) state.seasonFormats.set(s, new Map());
            if (!state.seasonPoints.has(s)) state.seasonPoints.set(s, new Map());

            state.seasonFormats.get(s).set(d, {
              champions,
              automatic,
              playoffsSemi: po.semi,
              playoffsElim: po.elim,
              relegation
            });

            state.seasonPoints.get(s).set(d, {
              winHome: wh,
              winAway: wa,
              draw: dr,
              loss: ls
            });

            if (it.title){
              if (!state.seasonTitles.has(s)) state.seasonTitles.set(s, new Map());
              state.seasonTitles.get(s).set(d, String(it.title));
            }
          }
        }

        function getSeasonFormat(seasonKey, divisionName){
          const fmt = state.seasonFormats.get(String(seasonKey))?.get(String(divisionName)) || null;
          if (!fmt) throw new Error(`Missing season format for ${seasonKey} / ${divisionName}`);
          return fmt;
        }

        function pointsRuleFor(seasonKey, divisionName){
          const rule = state.seasonPoints.get(String(seasonKey))?.get(String(divisionName)) || null;
          if (!rule) throw new Error(`Missing points rule for ${seasonKey} / ${divisionName}`);
          return rule;
        }

        function maxWinPointsFor(seasonKey, divisionName){
          const r = pointsRuleFor(seasonKey, divisionName);
          return Math.max(Number(r.winHome || 0), Number(r.winAway || 0));
        }

        function seasonUsesPPG(seasonKey, divisionName, asOfISO, includeUndated){
          const notes = activeNotesFor(seasonKey, divisionName, asOfISO, !!includeUndated);
          return notes.some(n => String(n.type || '').toLowerCase() === 'ppg');
        }

        function applyPPGRankingIfNeeded(seasonKey, divisionName, asOfISO, rows, includeUndated){
          if (!Array.isArray(rows) || !rows.length) return rows;
          if (!seasonUsesPPG(seasonKey, divisionName, asOfISO, !!includeUndated)) return rows;

          rows.forEach(r => {
            const p = Number(r.P || 0);
            const pts = Number(r.Pts || 0);
            r._ppg = p > 0 ? (pts / p) : 0;
          });

          rows.sort((a,b) => {
            if (b._ppg !== a._ppg) return b._ppg - a._ppg;
            if (b.Pts !== a.Pts) return b.Pts - a.Pts;
            if (b.GD !== a.GD) return b.GD - a.GD;
            if (b.GF !== a.GF) return b.GF - a.GF;
            return String(a.team).localeCompare(String(b.team));
          });

          rows.forEach((r, i) => r.pos = i + 1);
          rows.forEach(r => delete r._ppg);
          return rows;
        }

        function getBandPositions(seasonKey, divisionName){
          const fmt = getSeasonFormat(seasonKey, divisionName);

          const championStart = fmt.champions > 0 ? 1 : null;
          const championEnd = fmt.champions > 0 ? fmt.champions : null;

          const automaticStart = fmt.automatic > 0 ? (fmt.champions + 1) : null;
          const automaticEnd = fmt.automatic > 0 ? (fmt.champions + fmt.automatic) : null;

          const semiStart = fmt.playoffsSemi > 0 ? (fmt.champions + fmt.automatic + 1) : null;
          const semiEnd = fmt.playoffsSemi > 0 ? (semiStart + fmt.playoffsSemi - 1) : null;

          const elimStart = fmt.playoffsElim > 0 ? (fmt.champions + fmt.automatic + fmt.playoffsSemi + 1) : null;
          const elimEnd = fmt.playoffsElim > 0 ? (elimStart + fmt.playoffsElim - 1) : null;

          return {
            championStart,
            championEnd,
            automaticStart,
            automaticEnd,
            semiStart,
            semiEnd,
            elimStart,
            elimEnd,
            playoffExists: fmt.playoffsSemi > 0 || fmt.playoffsElim > 0
          };
        }

        function getCutRulesForSeason(seasonKey, divisionName, teamCount){
          const fmt = getSeasonFormat(seasonKey, divisionName);
          const bands = getBandPositions(seasonKey, divisionName);
          const relegationCut = fmt.relegation > 0 ? (teamCount - fmt.relegation) : null;

          return {
            champion: bands.championEnd,
            automatic: bands.automaticEnd,
            playoffByes: bands.semiEnd,
            playoff: bands.elimEnd,
            relegation: relegationCut
          };
        }

        function applyCutLinesToRenderedTable(cuts){
          Array.from(els.tbody.rows).forEach(tr => {
            tr.classList.remove(
              'cut-champion-after',
              'cut-automatic-after',
              'cut-playoff-byes-after',
              'cut-playoff-after',
              'cut-relegation-after'
            );
          });

          if (!cuts) return;

          const byPos = new Map();
          Array.from(els.tbody.rows).forEach(tr => {
            const pos = Number(String(tr.cells?.[0]?.textContent || '').trim());
            if (Number.isFinite(pos)) byPos.set(pos, tr);
          });

          if (cuts.champion && byPos.has(cuts.champion)) byPos.get(cuts.champion).classList.add('cut-champion-after');
          if (cuts.automatic && byPos.has(cuts.automatic)) byPos.get(cuts.automatic).classList.add('cut-automatic-after');
          if (cuts.playoffByes && byPos.has(cuts.playoffByes)) byPos.get(cuts.playoffByes).classList.add('cut-playoff-byes-after');
          if (cuts.playoff && byPos.has(cuts.playoff)) byPos.get(cuts.playoff).classList.add('cut-playoff-after');
          if (cuts.relegation && byPos.has(cuts.relegation)) byPos.get(cuts.relegation).classList.add('cut-relegation-after');
        }

        function expelledTeamsFor(seasonKey, divisionName, asOfISO, includeUndated){
          const out = new Set();

          const notes = activeNotesFor(seasonKey, divisionName, asOfISO, includeUndated);
          notes
            .filter(n => n.type === 'expelled')
            .forEach(n => {
              if (!n.entity) throw new Error(`Expelled note missing entity for ${seasonKey} / ${divisionName}`);
              out.add(canon(n.entity));
            });

          return out;
        }
        
        function initTeamStats(){
          return { P:0, W:0, D:0, L:0, GF:0, GA:0, GD:0, Pts:0 };
        }

        function expelledDisplayTeamsFor(seasonKey, divisionName, asOfISO, includeUndated){
          const out = new Map();

          const notes = activeNotesFor(seasonKey, divisionName, asOfISO, includeUndated);
          notes
            .filter(n => n.type === 'expelled')
            .forEach(n => {
              if (!n.entity) throw new Error(`Expelled note missing entity for ${seasonKey} / ${divisionName}`);
              const raw = String(n.team || n.entity || '').trim();
              if (raw) out.set(canon(n.entity), raw);
            });

          return out;
        }
        
        function addMatch(statsByTeam, match, ptsRule){
          const home = String(match.home || '').trim();
          const away = String(match.away || '').trim();
          const hg = Number(match.home_goals);
          const ag = Number(match.away_goals);

          if (!home || !away) return;
          if (!Number.isFinite(hg) || !Number.isFinite(ag)) return;

          const status = String(match.status || '').trim().toLowerCase();
          const isAbandoned = status === 'abandoned';
          const awarded = String(match.awarded || '').trim().toLowerCase();
          const countGoals = match.count_goals !== false;
          const countPoints = match.count_points !== false;

          if (isAbandoned && !countGoals && !countPoints){
            return;
          }

          if (!statsByTeam.has(home)) statsByTeam.set(home, initTeamStats());
          if (!statsByTeam.has(away)) statsByTeam.set(away, initTeamStats());

          const H = statsByTeam.get(home);
          const A = statsByTeam.get(away);

          if (countGoals){
            H.GF += hg;
            H.GA += ag;
            A.GF += ag;
            A.GA += hg;
          }

          if (!countPoints){
            return;
          }

          H.P += 1;
          A.P += 1;

          if (isAbandoned){
            if (awarded === 'home'){
              H.W += 1;
              A.L += 1;
              H.Pts += Number(ptsRule.winHome);
              return;
            }

            if (awarded === 'away'){
              A.W += 1;
              H.L += 1;
              A.Pts += Number(ptsRule.winAway);
              return;
            }

            if (awarded === 'draw'){
              H.D += 1;
              A.D += 1;
              H.Pts += Number(ptsRule.draw);
              A.Pts += Number(ptsRule.draw);
              return;
            }

            if (awarded === 'none' || awarded === ''){
              H.P -= 1;
              A.P -= 1;
              return;
            }
          }

          if (hg > ag){
            H.W += 1;
            A.L += 1;
            H.Pts += Number(ptsRule.winHome);
          } else if (hg < ag){
            A.W += 1;
            H.L += 1;
            A.Pts += Number(ptsRule.winAway);
          } else {
            H.D += 1;
            A.D += 1;
            H.Pts += Number(ptsRule.draw);
            A.Pts += Number(ptsRule.draw);
          }
        }

        function computeStandings(seasonKey, divisionName, asOfISO){
          const season = state.byKey[seasonKey];
          const div = season?.divisions?.[divisionName];
          const matches = Array.isArray(div?.matches) ? div.matches : [];
          const ptsRule = pointsRuleFor(seasonKey, divisionName);
          const asNum = isoToNum(asOfISO);
          const expelledSet = expelledTeamsFor(seasonKey, divisionName, asOfISO, false);

          const expelledDisplayMap = expelledDisplayTeamsFor(seasonKey, divisionName, asOfISO, false);
          
          const allTeams = new Set();
          for (const m of matches){
            const h = String(m.home || '').trim();
            const a = String(m.away || '').trim();
            if (h) allTeams.add(h);
            if (a) allTeams.add(a);
          }

          for (const rawName of expelledDisplayMap.values()){
            allTeams.add(rawName);
          }
          
          const stats = new Map();

          for (const m of matches){
            if (m?.playoffs || m?.playoff_round) continue;

            const dateISO = toISO(m.date);
            if (!dateISO) continue;
            if (isoToNum(dateISO) > asNum) continue;

            const h = String(m.home || '').trim();
            const a = String(m.away || '').trim();
            if (!h || !a) continue;

            if (expelledSet.has(canon(h)) || expelledSet.has(canon(a))) continue;
            
            const hg = Number(m.home_goals);
            const ag = Number(m.away_goals);
            if (!Number.isFinite(hg) || !Number.isFinite(ag)) continue;

            addMatch(stats, m, ptsRule);
          }

          const rows = [];
          for (const team of allTeams){
            const s = stats.get(team) || initTeamStats();
            s.GD = s.GF - s.GA;

            const isExpelled = expelledSet.has(canon(team));
            if (isExpelled){
              rows.push({
                team,
                P:0,W:0,D:0,L:0,GF:0,GA:0,GD:0,Pts:0,
                classes:['expelled'],
                move:'down'
              });
            } else {
              rows.push({
                team,
                P:s.P, W:s.W, D:s.D, L:s.L, GF:s.GF, GA:s.GA, GD:s.GD, Pts:s.Pts,
                classes:[],
                move:''
              });
            }
          }

          rows.sort((a,b) => {
            const aExpelled = Array.isArray(a.classes) && a.classes.includes('expelled');
            const bExpelled = Array.isArray(b.classes) && b.classes.includes('expelled');

            if (aExpelled && !bExpelled) return 1;
            if (!aExpelled && bExpelled) return -1;

            if (b.Pts !== a.Pts) return b.Pts - a.Pts;
            if (b.GD !== a.GD) return b.GD - a.GD;
            if (b.GF !== a.GF) return b.GF - a.GF;
            return String(a.team).localeCompare(String(b.team));
          });

          rows.forEach((r, i) => r.pos = i + 1);
          return rows;
        }

        function applyPointsAdjustments(seasonKey, divisionName, asOfISO, rows, includeUndated){
          const notes = activeNotesFor(seasonKey, divisionName, asOfISO, includeUndated)
            .filter(n => n.type === 'points_deduction' && Number.isFinite(n.pointsValue));

          if (!notes.length) return rows;

          const deltaByTeam = new Map();
          for (const n of notes){
            if (!n.entity) throw new Error(`points_deduction note missing entity for ${seasonKey} / ${divisionName}`);
            const k = canon(n.entity);
            deltaByTeam.set(k, (deltaByTeam.get(k) || 0) + Number(n.pointsValue));
          }

          rows.forEach(r => {
            const isExpelled = Array.isArray(r.classes) && r.classes.includes('expelled');
            if (isExpelled){
              r.P = 0;
              r.W = 0;
              r.D = 0;
              r.L = 0;
              r.GF = 0;
              r.GA = 0;
              r.GD = 0;
              r.Pts = 0;
              return;
            }

            const k = canon(r.team);
            if (!deltaByTeam.has(k)) return;
            r.Pts = Number(r.Pts || 0) + deltaByTeam.get(k);
          });

          rows.sort((a,b) => {
            if (b.Pts !== a.Pts) return b.Pts - a.Pts;
            if (b.GD !== a.GD) return b.GD - a.GD;
            if (b.GF !== a.GF) return b.GF - a.GF;
            return String(a.team).localeCompare(String(b.team));
          });

          rows.forEach((r, i) => r.pos = i + 1);
          return rows;
        }

        function applyZonesFromSeasonFormat(seasonKey, divisionName, rows, finalMode){
          const bands = getBandPositions(seasonKey, divisionName);
          const fmt = getSeasonFormat(seasonKey, divisionName);
          const teamCount = rows.length;
          const relegationLine = fmt.relegation > 0 ? (teamCount - fmt.relegation) : null;

          for (const r of rows){
            r.classes = Array.isArray(r.classes) ? r.classes : [];

            if (r.classes.includes('expelled')) continue;
            
            const pos = Number(r.pos);

            if (bands.championStart && pos >= bands.championStart && pos <= bands.championEnd){
              if (!r.classes.includes('champion')) r.classes.push('champion');
            }

            if (bands.automaticStart && pos >= bands.automaticStart && pos <= bands.automaticEnd){
              if (!r.classes.includes('promoted')) r.classes.push('promoted');
            }

            if (bands.semiStart && pos >= bands.semiStart && pos <= bands.semiEnd){
              if (!r.classes.includes('playoff-semi')) r.classes.push('playoff-semi');
            }

            if (bands.elimStart && pos >= bands.elimStart && pos <= bands.elimEnd){
              if (!r.classes.includes('playoff-elim')) r.classes.push('playoff-elim');
            }

            if (relegationLine != null && pos > relegationLine){
              if (finalMode){
                if (!r.classes.includes('relegated')) r.classes.push('relegated');
              } else {
                if (!r.classes.includes('relegation-zone')) r.classes.push('relegation-zone');
              }
            }
          }

          return rows;
        }

        function applyClinchedEmphasis(seasonKey, divisionName, asOfISO, rows){
          const ptsWinMax = maxWinPointsFor(seasonKey, divisionName);
          const activeRows = (Array.isArray(rows) ? rows : []).filter(r => !(Array.isArray(r.classes) && r.classes.includes('expelled')));
          const teamCountForCeiling = Math.max(0, Number(activeRows.length || 0));
          const maxGames = (teamCountForCeiling >= 2) ? ((teamCountForCeiling - 1) * 2) : 0;
          const bands = getBandPositions(seasonKey, divisionName);
          const fmt = getSeasonFormat(seasonKey, divisionName);

          const maxPts = new Map();
          for (const r of rows){
            const team = String(r.team || '').trim();
            const playedNow = Number(r.P || 0);
            const rem = Math.max(0, maxGames - (Number.isFinite(playedNow) ? playedNow : 0));
            maxPts.set(team, Number(r.Pts || 0) + ptsWinMax * rem);
          }

          function kthHighestMaxPtsAmongOthers(teamName, k){
            const vals = [];
            for (const r of rows){
              const t = String(r.team || '').trim();
              if (!t || t === teamName) continue;
              const v = maxPts.get(t);
              if (Number.isFinite(v)) vals.push(v);
            }
            vals.sort((a,b) => b - a);
            if (k <= 0) return null;
            if (vals.length < k) return null;
            return vals[k - 1];
          }

          const relPlaces = Math.max(0, Number(fmt.relegation || 0));
          const safePos = relPlaces > 0 ? (activeRows.length - relPlaces) : null;
          const safePtsNow = (safePos && safePos >= 1 && safePos <= activeRows.length)
            ? Number(activeRows[safePos - 1].Pts || 0)
            : null;

          for (const r of rows){
            r.classes = Array.isArray(r.classes) ? r.classes : [];
            if (r.classes.includes('expelled')) continue;
            const ptsNow = Number(r.Pts || 0);
            const team = String(r.team || '').trim();
            const teamMax = maxPts.get(team);

            r.classes = r.classes.filter(c =>
              c !== 'clinched-champion' &&
              c !== 'clinched-po-semi' &&
              c !== 'clinched-po-elim' &&
              c !== 'clinched-relegated'
            );

            if (bands.championEnd){
              const titleThreshold = kthHighestMaxPtsAmongOthers(team, bands.championEnd);
              if (titleThreshold != null && ptsNow > titleThreshold){
                r.classes.push('clinched-champion');
                continue;
              }
            }

            if (bands.semiEnd){
              const semiThreshold = kthHighestMaxPtsAmongOthers(team, bands.semiEnd);
              if (semiThreshold != null && ptsNow > semiThreshold){
                r.classes.push('clinched-po-semi');
                continue;
              }
            }

            if (bands.elimEnd){
              const elimThreshold = kthHighestMaxPtsAmongOthers(team, bands.elimEnd);
              if (elimThreshold != null && ptsNow > elimThreshold){
                r.classes.push('clinched-po-elim');
              }
            }

            if (relPlaces > 0 && safePtsNow != null && Number.isFinite(teamMax) && teamMax < safePtsNow){
              r.classes.push('clinched-relegated');
            }
          }

          return rows;
        }

        function playoffMatchesForLookup(seasonKey, divisionName){
          const seasonObj = state.byKey[seasonKey];
          const currentDivMatches = Array.isArray(seasonObj?.divisions?.[divisionName]?.matches)
            ? seasonObj.divisions[divisionName].matches
            : [];

          if (divisionName === 'North' || divisionName === 'South'){
            const sharedMatches = Array.isArray(seasonObj?.divisions?.['North/South']?.matches)
              ? seasonObj.divisions['North/South'].matches
              : [];
            return currentDivMatches.concat(sharedMatches);
          }

          return currentDivMatches;
        }

        function findPlayoffWinnerFromResults(seasonKey, divisionName){
          const matches = playoffMatchesForLookup(seasonKey, divisionName);

          const finals = matches
            .filter(m => {
              if (!m || !m.playoffs) return false;
              const pr = String(m.playoff_round || '').trim().toLowerCase();
              return pr === 'final';
            })
            .slice()
            .sort((a,b) => isoToNum(toISO(a.date)) - isoToNum(toISO(b.date)));

          const fin = finals.length ? finals[finals.length - 1] : null;
          if (!fin) return '';

          const h = String(fin.home_entity || fin.home || '').trim();
          const a = String(fin.away_entity || fin.away || '').trim();
          if (!h || !a) return '';

          const hg = Number(fin.home_goals);
          const ag = Number(fin.away_goals);

          if (Number.isFinite(hg) && Number.isFinite(ag)){
            if (hg > ag) return h;
            if (ag > hg) return a;
          }

          const hAet = Number(fin.home_aet);
          const aAet = Number(fin.away_aet);
          if (Number.isFinite(hAet) && Number.isFinite(aAet)){
            if (hAet > aAet) return h;
            if (aAet > hAet) return a;
          }

          const hPen = Number(fin.home_pens);
          const aPen = Number(fin.away_pens);
          if (Number.isFinite(hPen) && Number.isFinite(aPen)){
            if (hPen > aPen) return h;
            if (aPen > hPen) return a;
          }

          return '';
        }

        function applyFinalRulesFromNotes(seasonKey, divisionName, asOfISO, rows, includeUndated){
          const notes = activeNotesFor(seasonKey, divisionName, asOfISO, !!includeUndated);
          const notesByEntity = new Map();

          for (const n of notes){
            if (!n.entity) continue;
            const k = canon(n.entity);
            if (!notesByEntity.has(k)) notesByEntity.set(k, []);
            notesByEntity.get(k).push(n);
          }

          const fmt = getSeasonFormat(seasonKey, divisionName);
          const bands = getBandPositions(seasonKey, divisionName);
          const teamCount = rows.length;
          const relegationLinePos = fmt.relegation > 0 ? (teamCount - fmt.relegation) : null;
          const playoffWinner = bands.playoffExists ? findPlayoffWinnerFromResults(seasonKey, divisionName) : '';

          if (bands.playoffExists && !playoffWinner){
            throw new Error(`Play-off winner not found in results.json for ${seasonKey} / ${divisionName}`);
          }

          const hasNoRelegation = notes.some(n => n.type === 'no_relegation');

          const teamsNoPlayoffs = new Set(
            notes
              .filter(n => n.type === 'no_playoffs')
              .map(n => {
                if (!n.entity) throw new Error(`no_playoffs note missing entity for ${seasonKey} / ${divisionName}`);
                return canon(n.entity);
              })
          );

          const teamsNotPromoted = new Set(
            notes
              .filter(n => n.type === 'not_promoted')
              .map(n => {
                const who = String(n.team || n.entity || '').trim();
                if (!who) throw new Error(`not_promoted note missing team/entity for ${seasonKey} / ${divisionName}`);
                return canon(who);
              })
          );

          for (const r of rows){
            r.classes = Array.isArray(r.classes) ? r.classes : [];
            r.move = '';

            if (r.classes.includes('expelled')){
              r.move = 'down';
              continue;
            }

            const pos = Number(r.pos);

            if (bands.championStart && pos >= bands.championStart && pos <= bands.championEnd){
              if (!r.classes.includes('champion')) r.classes.push('champion');
              r.move = 'up';
            }

            if (bands.automaticStart && pos >= bands.automaticStart && pos <= bands.automaticEnd){
              if (!r.classes.includes('promoted')) r.classes.push('promoted');
              r.move = 'up';
            }

            if (bands.semiStart && pos >= bands.semiStart && pos <= bands.semiEnd){
              if (!r.classes.includes('playoff-semi')) r.classes.push('playoff-semi');
            }

            if (bands.elimStart && pos >= bands.elimStart && pos <= bands.elimEnd){
              if (!r.classes.includes('playoff-elim')) r.classes.push('playoff-elim');
            }

            if (!hasNoRelegation && relegationLinePos != null && pos > relegationLinePos){
              if (!r.classes.includes('relegated')) r.classes.push('relegated');
              r.move = 'down';
            }
          }

          if (playoffWinner){
            const poKey = canon(playoffWinner);
            const r = rows.find(x => canon(x.team) === poKey);

            if (r && !teamsNoPlayoffs.has(poKey) && !teamsNotPromoted.has(poKey)){
              r.classes = r.classes.filter(c => c !== 'playoff-semi' && c !== 'playoff-elim');
              if (!r.classes.includes('promoted')) r.classes.push('promoted');
              r.move = 'up';
            }
          }

          for (const r of rows){
            const k = canon(r.team);
            const tnotes = notesByEntity.get(k) || [];

            if (tnotes.some(n => n.type === 'demoted')){
              if (!r.classes.includes('relegated')) r.classes.push('relegated');
              r.move = 'down';
            }

            if (tnotes.some(n => n.type === 'reprieved')){
              r.classes = r.classes.filter(c => c !== 'relegated');
              if (r.move === 'down') r.move = '';
            }

            if (teamsNotPromoted.has(k)){
              r.classes = r.classes.filter(c => c !== 'promoted');
              if (r.move === 'up') r.move = '';
            }

            if (tnotes.some(n => n.type === 'folded')){
              r.classes = r.classes.filter(c => c !== 'relegated');
              if (!r.classes.includes('folded')) r.classes.push('folded');
              r.move = 'down';
            }

            if (tnotes.some(n => n.type === 'expelled')){
              r.classes = r.classes.filter(c => c !== 'relegated');
              if (!r.classes.includes('expelled')) r.classes.push('expelled');
              r.move = 'down';
            }

            if (teamsNoPlayoffs.has(k)){
              r.classes = r.classes.filter(c => c !== 'playoff-semi' && c !== 'playoff-elim');
              if (r.move === 'up' && !r.classes.includes('champion') && !r.classes.includes('promoted')){
                r.move = '';
              }
            }
          }

          if (hasNoRelegation){
            for (const r of rows){
              r.classes = r.classes.filter(c => c !== 'relegated');
              if (r.move === 'down') r.move = '';
            }
          }

          return rows;
        }

        function combineNotes(parts){
          const clean = s => String(s || '')
            .replace(/\s+/g, ' ')
            .trim()
            .replace(/[.;:,]+$/, '');

          const lowerFirst = s => {
            const txt = String(s || '').trim();
            return txt ? txt.charAt(0).toLowerCase() + txt.slice(1) : '';
          };

          const arr = Array.from(
            new Set((parts || []).map(clean).filter(Boolean))
          );

          if (!arr.length) return '';

          const joined = arr
            .map((txt, i) => i === 0 ? txt : lowerFirst(txt))
            .join('; ');

          return /[.!?]$/.test(joined) ? joined : (joined + '.');
        }

        function makeNoteSup(n, rowId, team){
          const sup = createEl('sup', { class:'note-ref' });
          if (rowId){
            sup.setAttribute('data-rowid', rowId);
            sup.setAttribute('title', `Jump to ${team} row`);
            const a = createEl('a', { href:'#', 'data-rowid':rowId, 'aria-label':`Jump to ${team} row`, role:'button' }, [String(n)]);
            a.addEventListener('click', e => {
              e.preventDefault();
              scrollToRow(rowId);
            });
            sup.appendChild(a);
          } else {
            sup.appendChild(createEl('span', {}, [String(n)]));
          }
          return sup;
        }

        function makeNoteSupToNote(n, noteId, team){
          const sup = createEl('sup', { class:'note-ref' });
          if (noteId){
            sup.setAttribute('data-noteid', noteId);
            sup.setAttribute('title', `Show note ${n} for ${team}`);
            const a = createEl('a', { href:'#', 'data-noteid':noteId, role:'button' }, [String(n)]);
            a.addEventListener('click', e => {
              e.preventDefault();
              scrollToNote(noteId);
            });
            sup.appendChild(a);
          } else {
            sup.appendChild(createEl('span', {}, [String(n)]));
          }
          return sup;
        }

        function scrollToRow(rowId){
          const tr = document.getElementById(rowId);
          if (!tr) return;
          tr.scrollIntoView({ behavior:'smooth', block:'center' });
          tr.classList.remove('row-flash');
          void tr.offsetWidth;
          tr.classList.add('row-flash');
        }

        function scrollToNote(noteId){
          const el = document.getElementById(noteId);
          if (!el) return;
          el.scrollIntoView({ behavior:'smooth', block:'center' });
          el.classList.remove('note-flash');
          void el.offsetWidth;
          el.classList.add('note-flash');
        }

        document.addEventListener('click', ev => {
          const nodeNote = ev.target.closest && ev.target.closest('[data-noteid]');
          if (nodeNote){
            ev.preventDefault();
            scrollToNote(nodeNote.getAttribute('data-noteid'));
            return;
          }

          const nodeRow = ev.target.closest && ev.target.closest('[data-rowid]');
          if (nodeRow){
            ev.preventDefault();
            scrollToRow(nodeRow.getAttribute('data-rowid'));
          }
        }, true);

        function renderSeasonDivisionNotesAndRefs(seasonKey, divisionName, asOfISO, includeUndated){
          els.tbody.querySelectorAll('td:nth-child(3) .note-ref').forEach(el => el.remove());

          const notes = activeNotesFor(seasonKey, divisionName, asOfISO, !!includeUndated);

          els.note.replaceChildren();
          if (!notes.length){
            els.note.hidden = true;
            return;
          }

          const teamGroups = new Map();
          const divisionWide = [];

          for (const n of notes){
            const noteText = String(n.note || '').trim();
            const effectiveSuffix = formatNoteDateSuffix(n.effectiveDate);

            if (!n.entity){
              if (noteText){
                divisionWide.push(noteText + effectiveSuffix);
              }
              continue;
            }

            const entityKey = canon(n.entity || n.team || '');
            if (!entityKey) continue;

            if (!teamGroups.has(entityKey)){
              teamGroups.set(entityKey, {
                team: String(n.team || n.entity || '').trim(),
                entity: String(n.entity || n.team || '').trim(),
                notes: []
              });
            }

            if (noteText){
              teamGroups.get(entityKey).notes.push(noteText + effectiveSuffix);
            }
          }

          const entries = [];
          const rowsArr = Array.from(els.tbody.rows);

          for (const { team, entity, notes:texts } of teamGroups.values()){
            const slug = resolveTeamSlug(entity || team, seasonKey);
            const label = displayNameForSeason(slug, seasonKey, team);
            const rowId = rowIdForTeam(slug, label);
            const rowEl = document.getElementById(rowId);
            const rowIndex = rowEl ? rowsArr.indexOf(rowEl) : Number.POSITIVE_INFINITY;

            entries.push({
              team,
              text: combineNotes(texts),
              rowId,
              rowIndex
            });
          }

          entries.sort((a,b) => (a.rowIndex - b.rowIndex) || a.team.localeCompare(b.team));

          els.note.hidden = false;
          let counter = 1;

          for (const e of entries){
            const noteId = 'note-' + counter;
            const supNoteToRow = makeNoteSup(counter, e.rowId, e.team);

            const line = createEl(
              'div',
              { class:'note-line', id: noteId },
              [ supNoteToRow, ' ', `${e.team}: ${e.text}` ]
            );

            els.note.appendChild(line);

            const tr = document.getElementById(e.rowId);
            const teamCell = tr && tr.cells ? tr.cells[2] : null;
            if (teamCell){
              teamCell.appendChild(makeNoteSupToNote(counter, noteId, e.team));
            }

            counter++;
          }

          for (const text of divisionWide){
            els.note.appendChild(createEl('div', { class:'note-line division-note' }, [ '• ', text ]));
          }
        }

        function buildTableRow(r, idx, seasonKey, opts = {}){
          const showMovement = !!opts.showMovement;

          const rawName = String(r.team || '').trim();
          const slug = resolveTeamSlug(rawName, seasonKey);
          const label = displayNameForSeason(slug, seasonKey, rawName);

          const tr = document.createElement('tr');
          tr.id = rowIdForTeam(slug, label);
          if (slug) tr.setAttribute('data-team-slug', slug);

          const classes = Array.isArray(r.classes) ? r.classes : [];
          classes.forEach(c => tr.classList.add(c));

          const hasSpecial =
            tr.classList.contains('champion') ||
            tr.classList.contains('promoted') ||
            tr.classList.contains('playoff-semi') ||
            tr.classList.contains('playoff-elim') ||
            tr.classList.contains('relegated') ||
            tr.classList.contains('relegation-zone') ||
            tr.classList.contains('folded') ||
            tr.classList.contains('expelled') ||
            tr.classList.contains('clinched-champion') ||
            tr.classList.contains('clinched-po-semi') ||
            tr.classList.contains('clinched-po-elim') ||
            tr.classList.contains('clinched-relegated');

          if (!hasSpecial){
            tr.classList.add((idx % 2 === 0) ? 'zebra-odd' : 'zebra-even');
          }

          tr.style.setProperty('--i', idx);
          tr.classList.add('anim-in');

          const mv = (showMovement && (r.move === 'up' || r.move === 'down')) ? r.move : '';

          const cells = [
            r.pos,
            { move: mv },
            label,
            r.P, r.W, r.D, r.L, r.GF, r.GA,
            { gd: r.GD },
            r.Pts
          ];

          cells.forEach((val, i) => {
            const td = document.createElement('td');

            if (i === 1){
              td.classList.add('move-col');
              if (val && typeof val === 'object'){
                if (val.move === 'up'){
                  setText(td, '↑');
                  td.classList.add('move-up');
                  td.title = 'Promoted';
                  td.setAttribute('aria-label', 'Promoted');
                } else if (val.move === 'down'){
                  setText(td, '↓');
                  td.classList.add('move-down');
                  td.title = 'Relegated';
                  td.setAttribute('aria-label', 'Relegated');
                } else {
                  setText(td, '');
                  td.classList.add('move-none');
                }
              } else {
                setText(td, '');
                td.classList.add('move-none');
              }
              tr.appendChild(td);
              return;
            }

            if (i === 9){
              let gd = Number((val && typeof val === 'object') ? val.gd : val);
              if (!Number.isFinite(gd)){
                const gf = Number(r.GF), ga = Number(r.GA);
                gd = (Number.isFinite(gf) && Number.isFinite(ga)) ? (gf - ga) : 0;
              }
              setText(td, gd > 0 ? ('+' + gd) : String(gd));
              td.classList.add(classForGD(gd));
              tr.appendChild(td);
              return;
            }

            setText(td, val != null ? val : '');
            tr.appendChild(td);
          });

          return tr;
        }

        function rebuildLegend(){
          const rows = Array.from(els.tbody.rows);

          const has = {
            champion: rows.some(r => r.classList.contains('champion')),
            promoted: rows.some(r => r.classList.contains('promoted')),
            playoffSemi: rows.some(r => r.classList.contains('playoff-semi')),
            playoffElim: rows.some(r => r.classList.contains('playoff-elim')),
            relegated: rows.some(r => r.classList.contains('relegated')),
            relegationZone: rows.some(r => r.classList.contains('relegation-zone')),
            clinchedChampion: rows.some(r => r.classList.contains('clinched-champion')),
            clinchedPoSemi: rows.some(r => r.classList.contains('clinched-po-semi')),
            clinchedPoElim: rows.some(r => r.classList.contains('clinched-po-elim')),
            clinchedRelegated: rows.some(r => r.classList.contains('clinched-relegated')),
            folded: rows.some(r => r.classList.contains('folded')),
            expelled: rows.some(r => r.classList.contains('expelled'))
          };

          const fmt = (state.current.season && state.current.division)
            ? getSeasonFormat(state.current.season, state.current.division)
            : null;

          const hasSplitPlayoffs = !!(fmt && Number(fmt.playoffsElim || 0) > 0 && Number(fmt.playoffsSemi || 0) > 0);
          const hasPlayoffsNoSplit = !!(fmt && Number(fmt.playoffsElim || 0) === 0 && Number(fmt.playoffsSemi || 0) > 0);

          const isFinalTable = has.promoted || has.playoffSemi || has.playoffElim || has.relegated || has.champion;

          els.legend.replaceChildren(createEl('strong',{textContent:'Legend:'}), document.createTextNode(' '));
          const parts = [];

          if (isFinalTable){
            if (has.champion) parts.push(['gold','Champions']);
            if (has.promoted) parts.push(['silver','Promoted']);

            if (hasSplitPlayoffs){
              if (has.playoffSemi) parts.push(['po-semi','Qualified for Play-off Semi-finals']);
              if (has.playoffElim) parts.push(['po-elim','Qualified for Play-off Eliminators']);
            } else if (hasPlayoffsNoSplit){
              if (has.playoffSemi) parts.push(['po-semi','Qualified for Play-offs']);
            } else {
              if (has.playoffSemi) parts.push(['po-semi','Qualified for Play-offs']);
              if (has.playoffElim) parts.push(['po-elim','Qualified for Play-offs']);
            }

            if (has.relegated) parts.push(['pink','Relegated']);
            else if (has.relegationZone) parts.push(['pink','Relegation zone']);
          } else {
            if (has.clinchedChampion) parts.push(['gold','Champions']);

            if (hasSplitPlayoffs){
              if (has.clinchedPoSemi) parts.push(['po-semi','Qualified for Play-off Semi-finals']);
              if (has.clinchedPoElim) parts.push(['po-elim','Qualified for Play-off Eliminators']);
            } else if (hasPlayoffsNoSplit){
              if (has.clinchedPoSemi) parts.push(['po-semi','Qualified for Play-offs']);
            } else {
              if (has.clinchedPoSemi) parts.push(['po-semi','Qualified for Play-offs']);
              if (has.clinchedPoElim) parts.push(['po-elim','Qualified for Play-offs']);
            }

            if (has.clinchedRelegated) parts.push(['pink','Relegation zone']);
          }

          if (has.folded) parts.push(['black','Folded']);
          if (has.expelled) parts.push(['grey','Expelled']);

          if (!parts.length){
            els.legend.style.display = 'none';
            return;
          }

          els.legend.style.display = '';
          parts.forEach(([cls,label], i) => {
            els.legend.appendChild(createEl('span',{ class:'swatch '+cls, 'aria-hidden':'true' }));
            els.legend.appendChild(document.createTextNode(label));
            if (i < parts.length - 1) els.legend.appendChild(document.createTextNode(', '));
          });
        }

        function leagueTitleFor(seasonKey, divisionName){
          const fromNotes = state.seasonTitles.get(String(seasonKey))?.get(String(divisionName)) || '';
          if (fromNotes) return fromNotes;

          const div = state.finalByKey?.[seasonKey]?.divisions?.[divisionName];
          const t = String(div?.title || '').trim();
          return t || divisionName;
        }

        function getLastLeagueDateForSeasonDivision(seasonKey, divisionName){
          const seasonObj = state.byKey?.[seasonKey];
          const divObj = seasonObj?.divisions?.[divisionName];
          const matches = Array.isArray(divObj?.matches) ? divObj.matches : [];

          const leagueDates = matches
            .filter(m => !m?.playoffs && !m?.playoff_round)
            .map(m => toISO(m.date))
            .filter(Boolean)
            .sort((a,b) => isoToNum(a) - isoToNum(b));

          return leagueDates.length ? leagueDates[leagueDates.length - 1] : null;
        }

        function getSeasonEndDateForSeasonDivision(seasonKey, divisionName){
          const seasonObj = state.byKey?.[seasonKey];
          const divisionMatches = Array.isArray(seasonObj?.divisions?.[divisionName]?.matches)
            ? seasonObj.divisions[divisionName].matches
            : [];

          let matches = divisionMatches;
          if (divisionName === 'North' || divisionName === 'South'){
            const sharedMatches = Array.isArray(seasonObj?.divisions?.['North/South']?.matches)
              ? seasonObj.divisions['North/South'].matches
              : [];
            matches = divisionMatches.concat(sharedMatches);
          }

          const playoffDates = matches
            .filter(m => (m?.playoffs || m?.playoff_round))
            .map(m => toISO(m.date))
            .filter(Boolean)
            .sort((a,b) => isoToNum(a) - isoToNum(b));

          const lastPlayoff = playoffDates.length ? playoffDates[playoffDates.length - 1] : null;
          const lastLeague = getLastLeagueDateForSeasonDivision(seasonKey, divisionName);

          return lastPlayoff || lastLeague || null;
        }

        function pillRank(name){
          const n = String(name || '').trim().toLowerCase();
          if (n === 'national') return 0;
          if (n === 'north') return 1;
          if (n === 'south') return 2;
          return 3;
        }

        function preferredDivisionForSeason(seasonKey){
          const season = state.byKey[seasonKey];
          if (!season) return null;
          const divNames = visibleDivisionNames(season.divisions || {});
          return divNames.includes('National') ? 'National'
            : divNames.includes('North') ? 'North'
            : divNames.includes('South') ? 'South'
            : divNames[0];
        }

        function renderPills(divisions, seasonKey){
          const names = visibleDivisionNames(divisions || {});
          els.pills.innerHTML = '';

          if (names.length <= 1){
            els.pills.style.display = 'none';
            els.pills.removeAttribute('data-era');
            return;
          }

          els.pills.style.display = 'flex';
          els.pills.setAttribute('data-era', startYear(seasonKey) >= 2004 ? 'post' : 'pre');

          const frag = document.createDocumentFragment();
          names.slice()
            .sort((a,b) => (pillRank(a) - pillRank(b)) || String(a).localeCompare(String(b)))
            .forEach(n => {
              const b = createEl('button', { type:'button', textContent:n });
              b.setAttribute('aria-pressed', n === state.current.division ? 'true' : 'false');
              b.addEventListener('click', () => {
                state.current.division = n;
                renderTable(state.current.season, n, state.current.asof);
              });
              frag.appendChild(b);
            });

          els.pills.appendChild(frag);
        }

        function syncPillPressedState(chosenDiv){
          Array.from(els.pills.querySelectorAll('button')).forEach(b => {
            b.setAttribute('aria-pressed', b.textContent === chosenDiv ? 'true' : 'false');
          });
        }

        function populateSeasons(){
          const sel = els.seasonSel;
          sel.innerHTML = '';

          if (!state.seasons.length){
            sel.appendChild(createEl('option', { textContent:'— no seasons —', disabled:true, selected:true }));
            return;
          }

          const frag = document.createDocumentFragment();
          state.seasons.forEach(s => frag.appendChild(createEl('option', { value:s.season, textContent:s.season })));
          sel.appendChild(frag);
        }

        function populateAsOf(seasonKey, divisionName){
          const season = state.byKey[seasonKey];
          if (!season) return;

          const div = season.divisions?.[divisionName];
          const matches = Array.isArray(div?.matches) ? div.matches : [];
          const fmt = getSeasonFormat(seasonKey, divisionName);

          const leagueMatches = matches.filter(m => !m?.playoffs && !m?.playoff_round);
          const leagueDates = Array.from(new Set(leagueMatches.map(m => toISO(m.date)).filter(Boolean)))
            .sort((a,b) => isoToNum(a) - isoToNum(b));

          const sel = els.asofSel;
          sel.innerHTML = '';

          const lastLeagueDate = leagueDates.length ? leagueDates[leagueDates.length - 1] : null;
          state.current.lastLeagueDate = lastLeagueDate;

          const hasPlayoffs = (fmt.playoffsSemi > 0 || fmt.playoffsElim > 0);
          state.current.hasPlayoffs = hasPlayoffs;

          const seasonFinalDate = getSeasonEndDateForSeasonDivision(seasonKey, divisionName);
          state.current.seasonFinalDate = seasonFinalDate;

          const visibleDates = (leagueDates.length > 1) ? leagueDates.slice(0, -1) : [];
          visibleDates.forEach(d => {
            sel.appendChild(createEl('option', { value:d, textContent: formatISODateShort(d) }));
          });

          if (hasPlayoffs && lastLeagueDate){
            const prettyRegularEnd = formatISODateShort(lastLeagueDate);
            sel.appendChild(createEl('option', { value:ASOF_DERIVED_REGULAR_END, textContent:`${prettyRegularEnd} (end of regular season)` }));
          }

          if (seasonFinalDate || lastLeagueDate){
            const prettySeasonFinal = formatISODateShort(seasonFinalDate || lastLeagueDate);
            const suffix = hasPlayoffs ? 'season final' : 'final standings';
            sel.appendChild(createEl('option', { value:ASOF_DERIVED_FINAL, textContent:`${prettySeasonFinal} (${suffix})` }));
          }

          sel.appendChild(createEl('option', { value:ASOF_REFERENCE_FINAL, textContent:'Reference - from league-tables.json' }));

          const allValues = Array.from(sel.options).map(o => o.value);
          const desired =
            allValues.includes(ASOF_DERIVED_FINAL) ? ASOF_DERIVED_FINAL :
            allValues.includes(ASOF_REFERENCE_FINAL) ? ASOF_REFERENCE_FINAL :
            (allValues[0] || ASOF_REFERENCE_FINAL);

          sel.value = desired;
          state.current.asof = desired;
        }

        function renderRows(rows, seasonKey, opts = {}){
          els.tbody.innerHTML = '';
          const frag = document.createDocumentFragment();
          rows.forEach((r, idx) => frag.appendChild(buildTableRow(r, idx, seasonKey, opts)));
          els.tbody.appendChild(frag);
        }

        function renderReferenceTable(seasonKey, divisionName){
          const season = state.finalByKey[seasonKey];
          const div = season?.divisions?.[divisionName];
          const rows = (div?.rows || []).slice().sort((a,b) => (a.pos || 0) - (b.pos || 0)).map(r => ({
            team: r.team,
            pos: r.pos,
            P: r.P,
            W: r.W,
            D: r.D,
            L: r.L,
            GF: r.GF,
            GA: r.GA,
            GD: (r.GD != null ? r.GD : (Number(r.GF || 0) - Number(r.GA || 0))),
            Pts: r.Pts,
            classes: [],
            move: ''
          }));

          renderRows(rows, seasonKey, { showMovement:false });
          applyCutLinesToRenderedTable(null);
          renderSeasonDivisionNotesAndRefs(seasonKey, divisionName, getSeasonEndDateForSeasonDivision(seasonKey, divisionName) || '9999-12-31', true);
          rebuildLegend();
        }

        function renderDerivedTable(seasonKey, divisionName, mode){
          const lastLeagueDate = state.current.lastLeagueDate;
          if (!lastLeagueDate){
            renderReferenceTable(seasonKey, divisionName);
            return;
          }

          const seasonEndDate = getSeasonEndDateForSeasonDivision(seasonKey, divisionName) || lastLeagueDate;
          const isFinal = (mode === 'final');

          let rows = computeStandings(seasonKey, divisionName, lastLeagueDate);
          rows = applyPointsAdjustments(seasonKey, divisionName, lastLeagueDate, rows, isFinal);
          rows = applyPPGRankingIfNeeded(seasonKey, divisionName, lastLeagueDate, rows, isFinal);

          if (!isFinal){
            rows = applyZonesFromSeasonFormat(seasonKey, divisionName, rows, false);
            rows = applyClinchedEmphasis(seasonKey, divisionName, lastLeagueDate, rows);
            renderRows(rows, seasonKey, { showMovement:false });
            applyCutLinesToRenderedTable(getCutRulesForSeason(seasonKey, divisionName, rows.length));
            renderSeasonDivisionNotesAndRefs(seasonKey, divisionName, lastLeagueDate, false);
            rebuildLegend();
            return;
          }

          rows = applyFinalRulesFromNotes(seasonKey, divisionName, seasonEndDate, rows, true);
          renderRows(rows, seasonKey, { showMovement:true });
          applyCutLinesToRenderedTable(getCutRulesForSeason(seasonKey, divisionName, rows.length));
          renderSeasonDivisionNotesAndRefs(seasonKey, divisionName, seasonEndDate, true);
          rebuildLegend();
        }

        function renderDateSpecificTable(seasonKey, divisionName, asOfISO){
          let rows = computeStandings(seasonKey, divisionName, asOfISO);
          rows = applyPointsAdjustments(seasonKey, divisionName, asOfISO, rows, false);
          rows = applyClinchedEmphasis(seasonKey, divisionName, asOfISO, rows);

          renderRows(rows, seasonKey, { showMovement:false });
          applyCutLinesToRenderedTable(getCutRulesForSeason(seasonKey, divisionName, rows.length));
          renderSeasonDivisionNotesAndRefs(seasonKey, divisionName, asOfISO, false);
          rebuildLegend();
        }

        function renderTable(seasonKey, preferredDivision, asOfISO){
          try{
            const season = state.byKey[seasonKey];
            if (!season) return;

            const chosenDiv = preferredDivision || preferredDivisionForSeason(seasonKey);
            state.current.season = seasonKey;
            state.current.division = chosenDiv;

            renderPills(season.divisions, seasonKey);
            syncPillPressedState(chosenDiv);

            populateAsOf(seasonKey, chosenDiv);

            if (asOfISO){
              const exists = Array.from(els.asofSel.options).some(o => o.value === asOfISO);
              if (exists){
                els.asofSel.value = asOfISO;
                state.current.asof = asOfISO;
              }
            }

            const effectiveAsOf = state.current.asof || els.asofSel.value;
            state.current.asof = effectiveAsOf;

            const leagueTitle = leagueTitleFor(seasonKey, chosenDiv);

            if (effectiveAsOf === ASOF_DERIVED_REGULAR_END){
              setText(els.caption, leagueTitle + ' (end of regular season)');
              renderDerivedTable(seasonKey, chosenDiv, 'regular');
            } else if (effectiveAsOf === ASOF_DERIVED_FINAL){
              setText(els.caption, leagueTitle + (state.current.hasPlayoffs ? ' (season final)' : ' (final standings)'));
              renderDerivedTable(seasonKey, chosenDiv, 'final');
            } else if (effectiveAsOf === ASOF_REFERENCE_FINAL){
              setText(els.caption, leagueTitle + ' (reference)');
              renderReferenceTable(seasonKey, chosenDiv);
            } else {
              setText(els.caption, `${leagueTitle} (as of ${formatISODateShort(effectiveAsOf)})`);
              renderDateSpecificTable(seasonKey, chosenDiv, effectiveAsOf);
            }

            if (els.seasonSel.value !== seasonKey) els.seasonSel.value = seasonKey;
          } catch(e){
            showErr('Render error', e.message || String(e));
          }
        }

        async function safeJson(res){
          const txt = await res.text();
          const cleaned = txt.replace(/^\uFEFF/, '').trim();

          try { return JSON.parse(cleaned); } catch {}

          const objStart = cleaned.indexOf('{');
          const objEnd = cleaned.lastIndexOf('}');
          if (objStart >= 0 && objEnd > objStart){
            try { return JSON.parse(cleaned.slice(objStart, objEnd + 1)); } catch {}
          }

          const arrStart = cleaned.indexOf('[');
          const arrEnd = cleaned.lastIndexOf(']');
          if (arrStart >= 0 && arrEnd > arrStart){
            try { return JSON.parse(cleaned.slice(arrStart, arrEnd + 1)); } catch {}
          }

          throw new Error('Invalid JSON');
        }

        async function fetchOptionalJson(url){
          try{
            const res = await fetch(url + (url.includes('?') ? '&' : '?') + 'v=' + Date.now(), { cache:'no-store', credentials:'omit' });
            if (!res.ok) return null;
            return await safeJson(res);
          } catch {
            return null;
          }
        }

        async function boot(){
          const loading = document.createElement('option');
          loading.textContent = 'Loading…';
          loading.disabled = true;
          loading.selected = true;
          els.seasonSel.appendChild(loading);

          try{
            const [resultsRes, tablesRes, metaRaw, notesRaw] = await Promise.all([
              fetch(RESULTS_SRC + (RESULTS_SRC.includes('?') ? '&' : '?') + 'v=' + Date.now(), { cache:'no-store', credentials:'omit' }),
              fetch(TABLES_SRC  + (TABLES_SRC.includes('?')  ? '&' : '?') + 'v=' + Date.now(), { cache:'no-store', credentials:'omit' }),
              fetchOptionalJson(CLUBS_META_SRC),
              fetchOptionalJson(SEASON_NOTES_SRC)
            ]);

            if (!resultsRes.ok) throw new Error('Results: ' + resultsRes.status + ' ' + resultsRes.statusText);
            if (!tablesRes.ok) throw new Error('Tables: ' + tablesRes.status + ' ' + tablesRes.statusText);
            if (!notesRaw) throw new Error('Could not load season-notes.json');

            const resultsRaw = await safeJson(resultsRes);
            const tablesRaw = await safeJson(tablesRes);

            const items = normalizeResults(resultsRaw);
            if (!items.length){
              showErr('No seasons found in results.json.', 'Expected { "seasons":[ ... ] }');
              return;
            }

            const finalItems = normalizeTables(tablesRaw);
            buildFinalIndex(finalItems);
            buildIndex(items);

            if (metaRaw) indexMeta(metaRaw);
            indexSeasonNotes(notesRaw);
            indexSeasonFormats(notesRaw);
            // expelled / expunged-record cases now come directly from season-notes.json
            populateSeasons();

            const initialSeason = state.seasons[0].season;
            const initialDiv = preferredDivisionForSeason(initialSeason);

            state.current.season = initialSeason;
            state.current.division = initialDiv;
            state.current.asof = ASOF_DERIVED_FINAL;

            els.seasonSel.value = initialSeason;
            renderTable(initialSeason, initialDiv, ASOF_DERIVED_FINAL);

            els.seasonSel.addEventListener('change', () => {
              const s = els.seasonSel.value;
              const d = preferredDivisionForSeason(s);

              state.current.season = s;
              state.current.division = d;
              state.current.asof = ASOF_DERIVED_FINAL;

              renderTable(s, d, ASOF_DERIVED_FINAL);
            });

            els.asofSel.addEventListener('change', () => {
              const v = els.asofSel.value;
              state.current.asof = v;
              renderTable(state.current.season, state.current.division, v);
            });

            clearErr();
          } catch(err){
            showErr('Could not load data.', err.message || String(err));
          }
        }

        if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', boot);
        else boot();
      })();
    </script>
  </body>
</html>
